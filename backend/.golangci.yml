version: "2"
run:
  issues-exit-code: 1
  tests: true
  allow-parallel-runners: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - decorder
    - dogsled
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - forbidigo
    - forcetypeassert
    - gocheckcompilerdirectives
    - goconst
    - gocritic
    - godot
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - gosmopolitan
    - grouper
    - importas
    - loggercheck
    - mirror
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - predeclared
    - promlinter
    - reassign
    - sqlclosecheck
    - tagalign
    - testableexamples
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    - zerologlint
  disable:
    - containedctx
    - cyclop
    - depguard
    - dupl
    - dupword
    - err113
    - exhaustive
    - exhaustruct
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - gocyclo
    - godox
    - interfacebloat
    - ireturn
    - lll
    - maintidx
    - makezero
    - musttag
    - nestif
    - nlreturn
    - nonamedreturns
    - prealloc
    - revive
    - rowserrcheck
    - tagliatelle
    - testpackage
    - varnamelen
    - wrapcheck
    - wsl
  settings:
    cyclop:
      max-complexity: 25
      package-average: 0
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
    forbidigo:
      forbid:
        - pattern: ^t\.SkipNow\(\)$
      exclude-godoc-examples: false
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - captLocal
        - singleCaseSwitch
        - sloppyReassign
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
      settings:
        rangeValCopy:
          sizeThreshold: 32
    gocyclo:
      min-complexity: 20
    govet:
      enable-all: true
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
        shadow:
          strict: true
    lll:
      line-length: 512
      tab-width: 1
    misspell:
      locale: US
      ignore-rules:
        - cancelled
        - cancelling
    nakedret:
      max-func-lines: 4
    nestif:
      min-complexity: 8
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    unparam:
      check-exported: false
    unused:
      field-writes-are-uses: false
      post-statements-are-reads: true
      exported-fields-are-used: false
      parameters-are-used: true
      local-variables-are-used: true
      generated-is-used: true
    wsl:
      allow-cuddle-declarations: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - bodyclose
          - errcheck
          - exhaustruct
          - forcetypeassert
          - goconst
          - gosec
          - nilnil
          - unparam
          - unused
        path: _test\.go
      - linters:
          - ireturn
        path: wire\.go
      - linters:
          - gosec
        path: tests/
      - linters:
          - bodyclose
        path: pkg/apiclient/core.roundtripper*
      - linters:
          - gosec
        path: pkg/types/fakes
      - linters:
          - bodyclose
        path: tests/testutil/
      - linters:
          - errcheck
          - forcetypeassert
          - mnd
        path: mock_?.*\.go
      - linters:
          - unused
        path: cmd/tools/codegen/queries
      - linters:
          - forcetypeassert
        path: pkg/types/mock/
      - linters:
          - forcetypeassert
        path: internal/platform/encoding/mock
      - linters:
          - forcetypeassert
        path: internal/platform/messagequeue/mock
      - linters:
          - forcetypeassert
        path: internal/platform/routing/mock
      - linters:
          - forcetypeassert
        path: internal/platform/search/mock
      - linters:
          - forcetypeassert
        path: internal/platform/uploads/mock
      - linters:
          - paralleltest
        path: internal/database/postgres
      - linters:
          - bodyclose
          - unused
        path: cmd/tools/codegen/openapi/golang/statics
      - linters:
          - gocritic
        path: cmd/tools/codegen/openapi/golang
      - linters:
          - gocritic
        path: cmd/tools/codegen
        text: 'rangeValCopy: each iteration copies'
      - linters:
          - paralleltest
        path: internal/platform/email/sendgrid
      - linters:
          - paralleltest
        path: internal/platform/featureflags/posthog
      - linters:
          - forcetypeassert
        path: internal/platform/uploads/images/mock.go
      - linters:
          - forcetypeassert
        path: internal/businesslogic/grocerylistpreparation/mocks.go
      - linters:
          - forcetypeassert
        path: internal/database/database_mock.go
      - linters:
          - gosec
        path: cmd/tools/codegen/configs/main.go
      - linters:
          - gocritic
        path: internal/platform/featureflags/launchdarkly/mock_client.go
      - linters:
          - paralleltest
        path: internal/config/env_vars_test.go
      - linters:
          - gocritic
        text: 'captLocal: `T'' should not be capitalized'
      - linters:
          - gosec
        text: 'G304:'
      - linters:
          - gosec
        text: 'G115:'
      - linters:
          - cyclop
        path: (.+)_test\.go
    paths:
      - cmd/playground
      - tests/integration
      - cmd/services/admin_webapp
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gci
    - gofmt
  settings:
    gci:
      sections:
        - standard
        - prefix(github.com/dinnerdonebetter/backend)
        - prefix(github.com/dinnerdonebetter)
        - default
      custom-order: true
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/dinnerdonebetter/backend
  exclusions:
    generated: lax
    paths:
      - cmd/playground
      - tests/integration
      - cmd/services/admin_webapp
      - third_party$
      - builtin$
      - examples$
