---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dinner-done-better-consumer-webapp-deployment
  labels:
    app: dinner-done-better-consumer-webapp
    app.kubernetes.io/name: dinner-done-better-consumer-webapp
spec:
  progressDeadlineSeconds: 1200
  selector:
    matchLabels:
      app: dinner-done-better-consumer-webapp
      app.kubernetes.io/name: dinner-done-better-consumer-webapp
  replicas: 1
  template:
    metadata:
      labels:
        app: dinner-done-better-consumer-webapp
        app.kubernetes.io/name: dinner-done-better-consumer-webapp
    spec:
      containers:
        - name: dinner-done-better-consumer-webapp
          image: dinner-done-better-consumer-webapp
          imagePullPolicy: Always
          env:
            - name: "CONFIGURATION_FILEPATH"
              value: "/etc/service-config.json"
            - name: "RUNNING_IN_KUBERNETES"
              value: "true"
            - name: "DINNER_DONE_BETTER_OBSERVABILITY_METRICS_OTEL_SERVICE_NAME"
              value: "dinner_done_better_consumer_webapp"
            - name: "DINNER_DONE_BETTER_OBSERVABILITY_TRACING_TRACING_SERVICE_NAME"
              value: "dinner_done_better_consumer_webapp"
          volumeMounts:
            - name: "config"
              mountPath: "/etc/service-config.json"
              subPath: "config.json"
          ports:
            - containerPort: 8000
              name: http
          livenessProbe:
            httpGet:
              path: "/_ops_/live"
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: "/_ops_/ready"
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: "config"
          configMap:
            name: "dinner-done-better-consumer-webapp-config"
---
