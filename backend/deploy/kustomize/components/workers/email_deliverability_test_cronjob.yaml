---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dinner-done-better-job-email-deliverability-test
spec:
  concurrencyPolicy: Replace
  schedule: "0 0 * * *" # daily at midnight UTC
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: email-deliverability-test
              image: dinner-done-better-job-email-deliverability-test
              imagePullPolicy: Always
              env:
                - name: "CONFIGURATION_FILEPATH"
                  value: "/etc/service-config.json"
                - name: "RUNNING_IN_KUBERNETES"
                  value: "true"
                - name: "DINNER_DONE_BETTER_OBSERVABILITY_METRICS_OTEL_SERVICE_NAME"
                  value: "dinner_done_better_job_email_deliverability_test"
                - name: "DINNER_DONE_BETTER_OBSERVABILITY_TRACING_TRACING_SERVICE_NAME"
                  value: "dinner_done_better_job_email_deliverability_test"
              volumeMounts:
                - name: "config"
                  mountPath: "/etc/service-config.json"
                  subPath: "config.json"
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
          volumes:
            - name: "config"
              configMap:
                name: "dinner-done-better-job-email-deliverability-test-config"
---