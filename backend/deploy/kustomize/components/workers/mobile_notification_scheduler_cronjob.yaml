---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dinner-done-better-job-mobile-notification-scheduler
spec:
  concurrencyPolicy: Replace
  schedule: "*/2 * * * *" # every 2 minutes
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: mobile-notification-scheduler
              image: dinner-done-better-job-mobile-notification-scheduler
              imagePullPolicy: Always
              env:
                - name: "CONFIGURATION_FILEPATH"
                  value: "/etc/service-config.json"
                - name: "RUNNING_IN_KUBERNETES"
                  value: "true"
                - name: "DINNER_DONE_BETTER_OBSERVABILITY_METRICS_OTEL_SERVICE_NAME"
                  value: "dinner_done_better_job_mobile_notification_scheduler"
                - name: "DINNER_DONE_BETTER_OBSERVABILITY_TRACING_TRACING_SERVICE_NAME"
                  value: "dinner_done_better_job_mobile_notification_scheduler"
              volumeMounts:
                - name: "config"
                  mountPath: "/etc/service-config.json"
                  subPath: "config.json"
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
          restartPolicy: OnFailure
          volumes:
            - name: "config"
              configMap:
                name: "dinner-done-better-job-mobile-notification-scheduler-config"
---