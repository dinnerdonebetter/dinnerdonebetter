---
# See: https://kubectl.docs.kubernetes.io/references/kustomize/kustomization/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# See: https://kubectl.docs.kubernetes.io/references/kustomize/kustomization/resource/
resources:
  - ../../../kustomize/components/api_server
  - backend_config_api_grpc.yaml
  - ../../../kustomize/components/workers
  - ../../../kustomize/components/async_functions
  - ../../../kustomize/components/admin_webapp
  # - ../../../kustomize/components/mcp_server

images:
  - name: dinner-done-better-service-api
    newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-service-api
    newTag: latest

  - name: dinner-done-better-job-db-cleaner
    newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-job-db-cleaner
    newTag: latest

  - name: dinner-done-better-job-email-deliverability-test
    newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-job-email-deliverability-test
    newTag: latest

  - name: dinner-done-better-job-queue-test
    newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-job-queue-test
    newTag: latest

  - name: dinner-done-better-job-meal-plan-finalizer
    newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-job-meal-plan-finalizer
    newTag: latest

  - name: dinner-done-better-job-meal-plan-grocery-list-init
    newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-job-meal-plan-grocery-list-init
    newTag: latest

  - name: dinner-done-better-job-meal-plan-task-creator
    newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-job-meal-plan-task-creator
    newTag: latest

  - name: dinner-done-better-job-search-data-index-scheduler
    newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-job-search-data-index-scheduler
    newTag: latest

  - name: dinner-done-better-job-mobile-notification-scheduler
    newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-job-mobile-notification-scheduler
    newTag: latest

  - name: dinner-done-better-async-message-handler
    newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-async-message-handler
    newTag: latest

  - name: dinner-done-better-admin-webapp
    newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-admin-webapp
    newTag: latest

  # - name: dinner-done-better-mcp-server
  #   newName: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-mcp-server
  #   newTag: latest

# See: https://kubectl.docs.kubernetes.io/references/kustomize/kustomization/patches/
patches:
  - path: patches/service-api-backendconfig.yaml
    target:
      kind: Service
      name: dinner-done-better-api-svc
  - path: patches/deployment-grpc-tls.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-service-api-deployment
  ### API Server - needs database, pubsub, service secrets (from Terraform api-service-config), workload identity
  - path: patches/deployment-workload-identity.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-service-api-deployment
  - path: patches/deployment-database-env.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-service-api-deployment
  - path: patches/deployment-pubsub-env.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-service-api-deployment
  - path: patches/deployment-service-secrets-env.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-service-api-deployment
  - path: patches/deployment-tracing-env.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-service-api-deployment

  ### Async Message Handler - needs database, pubsub, service secrets, environment, workload identity
  - path: patches/deployment-workload-identity.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-async-message-handler-deployment
  - path: patches/deployment-database-env.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-async-message-handler-deployment
  - path: patches/deployment-pubsub-env.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-async-message-handler-deployment
  - path: patches/deployment-service-secrets-env.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-async-message-handler-deployment
  - path: patches/deployment-push-notifications-env.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-async-message-handler-deployment
  - path: patches/deployment-apns-volume.yaml
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-async-message-handler-deployment
  - patch: |-
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_SERVICE_ENVIRONMENT
          value: prod
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-async-message-handler-deployment

  ### CronJobs - workload identity (api-service-account) for GCP Pub/Sub, Secret Manager
  - path: patches/cronjob-secrets-csi-volume.yaml
    target:
      kind: CronJob

  ### Email Deliverability Test CronJob - needs Resend API key
  - path: patches/cronjob-resend-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-email-deliverability-test

  ### Queue Test CronJob - needs database, pubsub
  - path: patches/cronjob-database-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-queue-test
  - path: patches/cronjob-pubsub-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-queue-test

  ### DB Cleaner CronJob - needs database only
  - path: patches/cronjob-database-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-db-cleaner

  ### Meal Plan Finalizer CronJob - needs database, pubsub
  - path: patches/cronjob-database-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-meal-plan-finalizer
  - path: patches/cronjob-pubsub-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-meal-plan-finalizer

  ### Meal Plan Grocery List Init CronJob - needs database, pubsub, segment
  - path: patches/cronjob-database-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-meal-plan-grocery-list-init
  - path: patches/cronjob-pubsub-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-meal-plan-grocery-list-init
  - path: patches/cronjob-segment-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-meal-plan-grocery-list-init

  ### Meal Plan Task Creator CronJob - needs database, pubsub, segment
  - path: patches/cronjob-database-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-meal-plan-task-creator
  - path: patches/cronjob-pubsub-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-meal-plan-task-creator
  - path: patches/cronjob-segment-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-meal-plan-task-creator

  ### Search Data Index Scheduler CronJob - needs database, pubsub
  - path: patches/cronjob-database-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-search-data-index-scheduler
  - path: patches/cronjob-pubsub-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-search-data-index-scheduler

  ### Mobile Notification Scheduler CronJob - needs database, pubsub
  - path: patches/cronjob-database-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-mobile-notification-scheduler
  - path: patches/cronjob-pubsub-env.yaml
    target:
      kind: CronJob
      name: dinner-done-better-job-mobile-notification-scheduler

  ### Admin Webapp - needs cookie and API service config
  - patch: |-
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_COOKIE_NAME
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-admin-webapp-config
              key: COOKIE_NAME
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_LIFETIME
          value: "168h"
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_HASH_KEY
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-admin-webapp-config
              key: COOKIE_HASH_KEY
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_BLOCK_KEY
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-admin-webapp-config
              key: COOKIE_BLOCK_KEY
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_DOMAIN
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-admin-webapp-config
              key: COOKIE_DOMAIN
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_SECURE_ONLY
          value: "true"
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_SERVER_PORT
          value: "8888"
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_API_SERVICE_HTTP_API_SERVER_URL
          value: "https://http-api.dinnerdonebetter.com"
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_API_SERVICE_GRPC_API_SERVER_URL
          value: "api.dinnerdonebetter.com:443"
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_API_SERVICE_OAUTH2_API_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-admin-webapp-config
              key: OAUTH2_CLIENT_ID
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_API_SERVICE_OAUTH2_API_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-admin-webapp-config
              key: OAUTH2_CLIENT_SECRET
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-admin-webapp-deployment

  # ### MCP Server - needs API service URL from dinner-done-better-admin-webapp-config, OAuth credentials from mcp-server-config
  # - patch: |-
  #     - op: add
  #       path: "/spec/template/spec/containers/0/env/-"
  #       value:
  #         name: DINNER_DONE_BETTER_API_SERVICE_HTTP_API_SERVER_URL
  #         valueFrom:
  #           configMapKeyRef:
  #             name: dinner-done-better-admin-webapp-config
  #             key: API_SERVER_HTTP_URL
  #     - op: add
  #       path: "/spec/template/spec/containers/0/env/-"
  #       value:
  #         name: DINNER_DONE_BETTER_API_SERVICE_GRPC_API_SERVER_URL
  #         valueFrom:
  #           configMapKeyRef:
  #             name: dinner-done-better-admin-webapp-config
  #             key: API_SERVER_GRPC_URL
  #     - op: add
  #       path: "/spec/template/spec/containers/0/env/-"
  #       value:
  #         name: DINNER_DONE_BETTER_API_SERVICE_OAUTH2_API_CLIENT_ID
  #         valueFrom:
  #           secretKeyRef:
  #             name: mcp-server-config
  #             key: OAUTH2_CLIENT_ID
  #     - op: add
  #       path: "/spec/template/spec/containers/0/env/-"
  #       value:
  #         name: DINNER_DONE_BETTER_API_SERVICE_OAUTH2_API_CLIENT_SECRET
  #         valueFrom:
  #           secretKeyRef:
  #             name: mcp-server-config
  #             key: OAUTH2_CLIENT_SECRET
  #   target:
  #     version: v1
  #     kind: Deployment
  #     name: dinner-done-better-mcp-server-deployment

labels:
  - pairs:
      app.kubernetes.io/name: dinner-done-better-backend
      deployed_by: skaffold

configMapGenerator:
  - name: dinner-done-better-service-api-config
    namespace: prod
    files:
      - config.json=./configs/api_service_config.json

  - name: dinner-done-better-async-message-handler-config
    namespace: prod
    files:
      - config.json=./configs/async_message_handler_config.json

  - name: dinner-done-better-job-db-cleaner-config
    namespace: prod
    files:
      - config.json=./configs/job_db_cleaner_config.json

  - name: dinner-done-better-job-email-deliverability-test-config
    namespace: prod
    files:
      - config.json=./configs/job_email_deliverability_test_config.json

  - name: dinner-done-better-job-queue-test-config
    namespace: prod
    files:
      - config.json=./configs/job_queue_test_config.json

  - name: dinner-done-better-job-meal-plan-finalizer-config
    namespace: prod
    files:
      - config.json=./configs/job_meal_plan_finalizer_config.json

  - name: dinner-done-better-job-meal-plan-grocery-list-init-config
    namespace: prod
    files:
      - config.json=./configs/job_meal_plan_grocery_list_initializer_config.json

  - name: dinner-done-better-job-meal-plan-task-creator-config
    namespace: prod
    files:
      - config.json=./configs/job_meal_plan_task_creator_config.json

  - name: dinner-done-better-job-search-data-index-scheduler-config
    namespace: prod
    files:
      - config.json=./configs/job_search_data_index_scheduler_config.json

  - name: dinner-done-better-job-mobile-notification-scheduler-config
    namespace: prod
    files:
      - config.json=./configs/job_mobile_notification_scheduler_config.json

  - name: dinner-done-better-admin-webapp-config
    namespace: prod
    files:
      - config.json=./configs/admin_webapp_config.json

  # - name: dinner-done-better-mcp-server-config
  #   namespace: prod
  #   files:
  #     - config.json=./configs/mcp_server_config.json

generatorOptions:
  disableNameSuffixHash: true
  labels:
    generated_by: skaffold
    deployed_by: skaffold
  annotations:
    generated_by: skaffold
    deployed_by: skaffold
