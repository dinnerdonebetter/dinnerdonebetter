# Database connection environment variables for CronJobs
# Applied via JSON patch to inject database secrets
- op: add
  path: "/spec/jobTemplate/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_DATABASE_READ_CONNECTION_HOST
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: DATABASE_HOST
- op: add
  path: "/spec/jobTemplate/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_DATABASE_READ_CONNECTION_PASSWORD
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: DATABASE_PASSWORD
- op: add
  path: "/spec/jobTemplate/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_DATABASE_WRITE_CONNECTION_HOST
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: DATABASE_HOST
- op: add
  path: "/spec/jobTemplate/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_DATABASE_WRITE_CONNECTION_PASSWORD
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: DATABASE_PASSWORD
- op: add
  path: "/spec/jobTemplate/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_DATABASE_OAUTH2_TOKEN_ENCRYPTION_KEY
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: OAUTH2_TOKEN_ENCRYPTION_KEY
- op: add
  path: "/spec/jobTemplate/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_DATABASE_USER_DEVICE_TOKEN_ENCRYPTION_KEY
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: USER_DEVICE_TOKEN_ENCRYPTION_KEY
