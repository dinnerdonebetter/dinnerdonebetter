# Database connection environment variables for Deployments
# Applied via JSON patch to inject database secrets from GCP Secret Manager (via CSI driver sync)
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_DATABASE_READ_CONNECTION_HOST
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: DATABASE_HOST
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_DATABASE_READ_CONNECTION_PASSWORD
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: DATABASE_PASSWORD
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_DATABASE_WRITE_CONNECTION_HOST
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: DATABASE_HOST
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_DATABASE_WRITE_CONNECTION_PASSWORD
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: DATABASE_PASSWORD
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_DATABASE_OAUTH2_TOKEN_ENCRYPTION_KEY
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: OAUTH2_TOKEN_ENCRYPTION_KEY
