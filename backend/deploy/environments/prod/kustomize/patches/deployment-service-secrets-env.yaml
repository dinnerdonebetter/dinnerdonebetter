# Service-specific secrets for Deployments (Algolia, SendGrid, PostHog, JWT, SSO)
# Applied via JSON patch to inject service secrets
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_ANALYTICS_SEGMENT_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: SEGMENT_API_TOKEN
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_ANALYTICS_PROXY_SOURCES_IOS_PROVIDER
    value: segment
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_ANALYTICS_PROXY_SOURCES_IOS_CIRCUIT_BREAKER_NAME
    value: ios_analytics
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_ANALYTICS_PROXY_SOURCES_IOS_SEGMENT_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: IOS_SEGMENT_API_TOKEN
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_SEARCH_ALGOLIA_API_KEY
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: ALGOLIA_API_KEY
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_SEARCH_ALGOLIA_APP_ID
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: ALGOLIA_APPLICATION_ID
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_EMAIL_RESEND_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: RESEND_API_KEY
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_FEATURE_FLAGS_POSTHOG_PROJECT_API_KEY
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: POSTHOG_API_KEY
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_FEATURE_FLAGS_POSTHOG_PERSONAL_API_KEY
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: POSTHOG_PERSONAL_API_KEY
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_SERVICE_AUTH_TOKENS_SIGNING_KEY
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: JWT_SIGNING_KEY
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_SERVICE_AUTH_SSO_CONFIG_GOOGLE_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: GOOGLE_SSO_OAUTH2_CLIENT_ID
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: DINNER_DONE_BETTER_SERVICE_AUTH_SSO_CONFIG_GOOGLE_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: api-service-config
        key: GOOGLE_SSO_OAUTH2_CLIENT_SECRET
