# Dependabot configuration for Dinner Done Better
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Go modules (backend)
  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"

  # GitHub Actions (workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker base images (backend deploy)
  - package-ecosystem: "docker"
    directory: "/backend/deploy/dockerfiles"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  # Docker base images (testing / integration)
  - package-ecosystem: "docker"
    directory: "/backend/deploy/environments/testing/dockerfiles"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  # Terraform (backend prod)
  - package-ecosystem: "terraform"
    directory: "/backend/deploy/environments/prod/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "terraform"

  # Terraform (infra prod)
  - package-ecosystem: "terraform"
    directory: "/infra/deploy/environments/prod/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "terraform"
