---
name: deploy_ios

on:
  gollum:
  # When ready to deploy iOS on release, uncomment below (and comment or remove gollum above):
  # release:
  #   types: [published]
  #   # paths:
  #   #   - ios/**

jobs:
  deploy:
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Create Secrets.xcconfig
        run: |
          cat > Secrets.xcconfig <<XCEOF
          OAUTH2_CLIENT_ID = ${{ secrets.PROD_IOS_OAUTH2_CLIENT_ID }}
          OAUTH2_CLIENT_SECRET = ${{ secrets.PROD_IOS_OAUTH2_CLIENT_SECRET }}
          SEGMENT_WRITE_KEY = ${{ secrets.PROD_IOS_SEGMENT_WRITE_KEY }}
          REVENUECAT_API_KEY = ${{ secrets.PROD_IOS_REVENUECAT_API_KEY }}
          XCEOF

      - name: Install Ruby bundler deps
        run: bundle install

      - name: Deploy to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.PROD_APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.PROD_APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.PROD_APP_STORE_CONNECT_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.PROD_MATCH_ENCRYPTION_KEY }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.PROD_MATCH_GIT_BASIC_AUTHORIZATION }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane beta
