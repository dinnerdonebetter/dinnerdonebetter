---
on: 
  # gollum:
  pull_request:
    paths:
      - backend/**/*.go
      - ios/**/*.swift

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

name: unit tests
jobs:
  changes:
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - backend/**/*.go
            ios:
              - ios/**/*.swift
              - ios/**/*.xcodeproj
              - ios/**/*.xcworkspace
              - ios/Makefile

  backend:
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    timeout-minutes: 25
    strategy:
      matrix:
        go-version: ['1.26.x']
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Go build and test cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: run unit tests
        working-directory: backend
        run: make test

  ios_unit_tests:
    needs: [changes]
    if: ${{ needs.changes.outputs.ios == 'true' }}
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Create Secrets.xcconfig
        working-directory: ios
        run: cp Secrets.xcconfig.example Secrets.xcconfig

      - name: Run unit tests
        working-directory: ios
        env:
          DESTINATION: platform=iOS Simulator,name=iPhone 16 Pro,OS=18.6
        run: make unit-test

