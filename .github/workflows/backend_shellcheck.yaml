---
on:
  pull_request:
    paths:
      - backend/scripts/**/*.sh

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

name: backend shellcheck
jobs:
  backend:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run shellcheck
        uses: dagger/dagger-for-github@v8
        with:
          version: "0.18.19"
          verb: call
          module: ./dagger
          args: backend-shellcheck --source=.
