---
on:
  pull_request:
    paths:
      - backend/cmd/**
      - backend/pkg/**
      - backend/internal/**
      - backend/go.mod
      - backend/go.sum

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

name: backend - generated files
jobs:
  configs:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Ensure configs can be generated
        uses: dagger/dagger-for-github@v8
        with:
          version: "0.18.19"
          verb: call
          module: ./dagger
          args: backend-gen-configs --source=.

  queries:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Ensure queries and querier can be generated
        uses: dagger/dagger-for-github@v8
        with:
          version: "0.18.19"
          verb: call
          module: ./dagger
          args: backend-gen-queries --source=.

  env_vars_file:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: generate env vars file
        uses: dagger/dagger-for-github@v8
        with:
          version: "0.18.19"
          verb: call
          module: ./dagger
          args: backend-gen-env-vars --source=.

  go_mod_tidy:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Ensure go.mod and go.sum are tidy
        uses: dagger/dagger-for-github@v8
        with:
          version: "0.18.19"
          verb: call
          module: ./dagger
          args: backend-go-mod-tidy --source=.
