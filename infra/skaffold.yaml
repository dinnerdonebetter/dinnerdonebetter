---
apiVersion: skaffold/v4beta11
kind: Config

metadata:
  name: dinner-done-better-infra

profiles:
  # localdev profile - uses plain K8s manifests, no Helm required
  - name: localdev
    activation:
      - kubeContext: docker-desktop
    manifests:
      kustomize:
        paths:
          - deploy/environments/localdev/kustomize
    deploy:
      kubeContext: docker-desktop
      kubectl:
        defaultNamespace: localdev

  - name: prod
    build:
      tagPolicy:
        sha256: {}
      artifacts:
        - image: us-central1-docker.pkg.dev/dinner-done-better-prod/containers/dinner-done-better-root-site
          docker:
            dockerfile: Dockerfile
          context: ../root_site

    manifests:
      kustomize:
        paths:
          - deploy/environments/prod/kustomize

    deploy:
      kubectl:
        defaultNamespace: prod
