---
# SecretProviderClass defines which secrets to fetch from GCP Secret Manager
# and how to expose them to pods (as files and/or as K8s Secrets)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: api-secrets
  namespace: dev
spec:
  provider: gcp
  parameters:
    # Secrets to fetch from GCP Secret Manager
    # Format: "projects/<project>/secrets/<secret-name>/versions/<version>"
    secrets: |
      - resourceName: "projects/dinner-done-better-dev/secrets/database-password/versions/latest"
        path: "database-password"
      - resourceName: "projects/dinner-done-better-dev/secrets/database-host/versions/latest"
        path: "database-host"
      - resourceName: "projects/dinner-done-better-dev/secrets/oauth2-token-encryption-key/versions/latest"
        path: "oauth2-token-encryption-key"
      - resourceName: "projects/dinner-done-better-dev/secrets/jwt-signing-key/versions/latest"
        path: "jwt-signing-key"
      - resourceName: "projects/dinner-done-better-dev/secrets/algolia-api-key/versions/latest"
        path: "algolia-api-key"
      - resourceName: "projects/dinner-done-better-dev/secrets/algolia-app-id/versions/latest"
        path: "algolia-app-id"
      - resourceName: "projects/dinner-done-better-dev/secrets/sendgrid-api-token/versions/latest"
        path: "sendgrid-api-token"
      - resourceName: "projects/dinner-done-better-dev/secrets/segment-api-token/versions/latest"
        path: "segment-api-token"
      - resourceName: "projects/dinner-done-better-dev/secrets/posthog-personal-api-key/versions/latest"
        path: "posthog-personal-api-key"
      - resourceName: "projects/dinner-done-better-dev/secrets/posthog-project-api-key/versions/latest"
        path: "posthog-project-api-key"
      - resourceName: "projects/dinner-done-better-dev/secrets/google-sso-client-id/versions/latest"
        path: "google-sso-client-id"
      - resourceName: "projects/dinner-done-better-dev/secrets/google-sso-client-secret/versions/latest"
        path: "google-sso-client-secret"
  # Optionally sync secrets to Kubernetes Secrets (for use as env vars)
  secretObjects:
    - secretName: api-service-secrets
      type: Opaque
      data:
        - objectName: "database-password"
          key: DATABASE_PASSWORD
        - objectName: "database-host"
          key: DATABASE_HOST
        - objectName: "oauth2-token-encryption-key"
          key: OAUTH2_TOKEN_ENCRYPTION_KEY
        - objectName: "jwt-signing-key"
          key: JWT_SIGNING_KEY
        - objectName: "algolia-api-key"
          key: ALGOLIA_API_KEY
        - objectName: "algolia-app-id"
          key: ALGOLIA_APPLICATION_ID
        - objectName: "sendgrid-api-token"
          key: SENDGRID_API_TOKEN
        - objectName: "segment-api-token"
          key: SEGMENT_API_TOKEN
        - objectName: "posthog-personal-api-key"
          key: POSTHOG_PERSONAL_API_KEY
        - objectName: "posthog-project-api-key"
          key: POSTHOG_API_KEY
        - objectName: "google-sso-client-id"
          key: GOOGLE_SSO_OAUTH2_CLIENT_ID
        - objectName: "google-sso-client-secret"
          key: GOOGLE_SSO_OAUTH2_CLIENT_SECRET
---
