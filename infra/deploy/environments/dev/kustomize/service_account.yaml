---
# Kubernetes ServiceAccount annotated for Workload Identity
# This allows pods to authenticate as the GCP service account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service-account
  namespace: dev
  annotations:
    # This annotation links the K8s SA to the GCP SA for Workload Identity
    iam.gke.io/gcp-service-account: workload-identity-sa@dinner-done-better-dev.iam.gserviceaccount.com
---
