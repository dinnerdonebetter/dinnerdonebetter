---
# Standalone ingress for admin so it gets its own load balancer.
# The main ingress fails to provision due to transient GCE controller issues;
# this ensures admin.dinnerdonebetter.com is reachable independently.
# HTTP only; Cloudflare (--cloudflare-proxied) terminates HTTPS at the edge.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dinner-done-better-admin-ingress
  annotations:
    kubernetes.io/ingress.class: gce
    external-dns.alpha.kubernetes.io/hostname: admin.dinnerdonebetter.com
spec:
  rules:
    - host: admin.dinnerdonebetter.com
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: dinner-done-better-admin-webapp-svc
                port:
                  number: 8888
---
