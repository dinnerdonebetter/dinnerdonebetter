---
# See: https://kubectl.docs.kubernetes.io/references/kustomize/kustomization/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# See: https://kubectl.docs.kubernetes.io/references/kustomize/kustomization/resource/
resources:
  - namespace.yaml
  - external_dns.yaml
  - ingress.yaml
  - otel_collector.yaml
  - cert_issuer.yaml # the LetsEncrypt definition that will issue our cert
  - certificate.yaml # the certificate request itself for the issuer to fulfill
  - grpc_backend_cert.yaml # self-signed TLS cert for gRPC backend (GCE LB HTTP2 requires TLS)
  - service_account.yaml # Workload Identity service account for accessing GCP resources
  - secret_provider_class.yaml # GCP Secret Manager integration via CSI driver
  - secret_sync.yaml # Sync SecretProviderClass secrets to api-service-secrets K8s Secret
  - kube_state_metrics.yaml
  - root_site_deployment.yaml
  - root_site_service.yaml

generatorOptions:
  disableNameSuffixHash: true
  labels:
    deployed_by: skaffold
    generated_by: skaffold
  annotations:
    deployed_by: skaffold
    generated_by: skaffold

patches:
  - patch: |-
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: PROMETHEUS_USERNAME
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-creds
              key: GRAFANA_CLOUD_PROMETHEUS_USERNAME
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: PROMETHEUS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-creds
              key: GRAFANA_CLOUD_PROMETHEUS_PASSWORD
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: LOKI_USERNAME
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-creds
              key: GRAFANA_CLOUD_LOKI_USERNAME
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: LOKI_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-creds
              key: GRAFANA_CLOUD_LOKI_PASSWORD
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: TEMPO_USERNAME
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-creds
              key: GRAFANA_CLOUD_TEMPO_USERNAME
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: TEMPO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-creds
              key: GRAFANA_CLOUD_TEMPO_PASSWORD
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: OTEL_TRACE_SAMPLING_PERCENTAGE
          value: "100"
    target:
      version: v1
      kind: Deployment
      name: opentelemetry-collector

  # Consumer webapp (root site) - cookie and API service config from terraform-managed secret
  - patch: |-
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_COOKIE_NAME
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-consumer-webapp-secrets
              key: COOKIE_NAME
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_HASH_KEY
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-consumer-webapp-secrets
              key: COOKIE_HASH_KEY
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_BLOCK_KEY
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-consumer-webapp-secrets
              key: COOKIE_BLOCK_KEY
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_DOMAIN
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-consumer-webapp-secrets
              key: COOKIE_DOMAIN
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_LIFETIME
          value: "168h"
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_COOKIES_SECURE_ONLY
          value: "true"
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_API_SERVICE_HTTP_API_SERVER_URL
          value: "https://http-api.dinnerdonebetter.com"
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_API_SERVICE_GRPC_API_SERVER_URL
          value: "api.dinnerdonebetter.com:443"
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_API_SERVICE_OAUTH2_API_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-consumer-webapp-secrets
              key: OAUTH2_CLIENT_ID
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: DINNER_DONE_BETTER_API_SERVICE_OAUTH2_API_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: dinner-done-better-consumer-webapp-secrets
              key: OAUTH2_CLIENT_SECRET
    target:
      version: v1
      kind: Deployment
      name: dinner-done-better-root-site-deployment

  # Pyroscope (Grafana Cloud) - uncomment to enable for consumer webapp
  # - patch: |-
  #     - op: add
  #       path: "/spec/template/spec/containers/0/env/-"
  #       value:
  #         name: DINNER_DONE_BETTER_OBSERVABILITY_PROFILING_PYROSCOPE_BASIC_AUTH_USER
  #         valueFrom:
  #           secretKeyRef:
  #             name: grafana-cloud-creds
  #             key: GRAFANA_CLOUD_PYROSCOPE_USERNAME
  #     - op: add
  #       path: "/spec/template/spec/containers/0/env/-"
  #       value:
  #         name: DINNER_DONE_BETTER_OBSERVABILITY_PROFILING_PYROSCOPE_BASIC_AUTH_PASSWORD
  #         valueFrom:
  #           secretKeyRef:
  #             name: grafana-cloud-creds
  #             key: GRAFANA_CLOUD_PYROSCOPE_PASSWORD
  #   target:
  #     version: v1
  #     kind: Deployment
  #     name: dinner-done-better-root-site-deployment

configMapGenerator:
  - name: opentelemetry-collector-config
    namespace: prod
    files:
      - config.yaml=./configs/otel_collector_config.yaml

  - name: dinner-done-better-consumer-webapp-config
    namespace: prod
    files:
      - config.json=./configs/consumer_webapp_config.json

namespace: prod
---
