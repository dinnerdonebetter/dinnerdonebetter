---
# SecretSync creates api-service-secrets K8s Secret from SecretProviderClass.
# Requires --enable-secret-sync on the GKE cluster (gcloud or Terraform).
# The GKE Secret Manager add-on does not support secretObjects; SecretSync handles it.
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: api-service-secrets
  namespace: prod
spec:
  serviceAccountName: api-service-account
  secretProviderClassName: api-secrets
  secretObject:
    type: Opaque
    data:
      - sourcePath: "database-password"
        targetKey: DATABASE_PASSWORD
      - sourcePath: "database-host"
        targetKey: DATABASE_HOST
      - sourcePath: "oauth2-token-encryption-key"
        targetKey: OAUTH2_TOKEN_ENCRYPTION_KEY
      - sourcePath: "jwt-signing-key"
        targetKey: JWT_SIGNING_KEY
      - sourcePath: "algolia-api-key"
        targetKey: ALGOLIA_API_KEY
      - sourcePath: "algolia-app-id"
        targetKey: ALGOLIA_APPLICATION_ID
      - sourcePath: "sendgrid-api-token"
        targetKey: SENDGRID_API_TOKEN
      - sourcePath: "posthog-project-api-key"
        targetKey: POSTHOG_API_KEY
      - sourcePath: "google-sso-client-id"
        targetKey: GOOGLE_SSO_OAUTH2_CLIENT_ID
      - sourcePath: "google-sso-client-secret"
        targetKey: GOOGLE_SSO_OAUTH2_CLIENT_SECRET
