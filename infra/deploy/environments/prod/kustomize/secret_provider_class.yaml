---
# SecretProviderClass defines which secrets to fetch from GCP Secret Manager
# and how to expose them to pods (as files and/or as K8s Secrets)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: api-secrets
  namespace: prod
spec:
  provider: gke
  parameters:
    # Secrets to fetch from GCP Secret Manager
    # Format: "projects/<project>/secrets/<secret-name>/versions/<version>"
    secrets: |
      - resourceName: "projects/dinner-done-better-prod/secrets/database-password/versions/latest"
        path: "database-password"
      - resourceName: "projects/dinner-done-better-prod/secrets/database-host/versions/latest"
        path: "database-host"
      - resourceName: "projects/dinner-done-better-prod/secrets/oauth2-token-encryption-key/versions/latest"
        path: "oauth2-token-encryption-key"
      - resourceName: "projects/dinner-done-better-prod/secrets/jwt-signing-key/versions/latest"
        path: "jwt-signing-key"
      - resourceName: "projects/dinner-done-better-prod/secrets/algolia-api-key/versions/latest"
        path: "algolia-api-key"
      - resourceName: "projects/dinner-done-better-prod/secrets/algolia-app-id/versions/latest"
        path: "algolia-app-id"
      - resourceName: "projects/dinner-done-better-prod/secrets/sendgrid-api-token/versions/latest"
        path: "sendgrid-api-token"
      - resourceName: "projects/dinner-done-better-prod/secrets/segment-api-token/versions/latest"
        path: "segment-api-token"
      - resourceName: "projects/dinner-done-better-prod/secrets/posthog-personal-api-key/versions/latest"
        path: "posthog-personal-api-key"
      - resourceName: "projects/dinner-done-better-prod/secrets/posthog-project-api-key/versions/latest"
        path: "posthog-project-api-key"
      - resourceName: "projects/dinner-done-better-prod/secrets/google-sso-client-id/versions/latest"
        path: "google-sso-client-id"
      - resourceName: "projects/dinner-done-better-prod/secrets/google-sso-client-secret/versions/latest"
        path: "google-sso-client-secret"
---
