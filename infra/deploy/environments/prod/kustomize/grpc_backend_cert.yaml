---
# SelfSigned issuer for internal backend TLS (GCE L7 LB HTTP2 protocol
# requires TLS on the backend, but doesn't validate the cert).
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grpc-backend-tls
spec:
  secretName: grpc-backend-tls
  duration: 87600h # 10 years
  renewBefore: 43800h # 5 years
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  dnsNames:
    - dinner-done-better-api-svc
    - dinner-done-better-api-svc.prod.svc.cluster.local
  issuerRef:
    name: selfsigned
    kind: Issuer
---
