// Recipes

message Recipe {
  google.protobuf.Timestamp created_at = 1;
  optional string inspired_by_recipe_id = 2;
  optional google.protobuf.Timestamp last_updated_at = 3;
  optional google.protobuf.Timestamp archived_at = 4;
  common.Float32RangeWithOptionalMax estimated_portions = 5;
  string plural_portion_name = 6;
  string description = 7;
  string name = 8;
  string portion_name = 9;
  string id = 10;
  string created_by_user = 11;
  string source = 12;
  string slug = 13;
  MealComponentType yields_component_type = 14;
  repeated RecipePrepTask prep_tasks = 15;
  repeated RecipeStep steps = 16;
  repeated RecipeMedia media = 17;
  string status = 19;
  bool eligible_for_meals = 20;
}

message RecipeCreationRequestInput {
  optional string inspired_by_recipe_id = 1;
  string name = 2;
  string source = 3;
  string description = 4;
  string plural_portion_name = 5;
  string portion_name = 6;
  string slug = 7;
  MealComponentType yields_component_type = 8;
  common.Float32RangeWithOptionalMax estimated_portions = 9;
  repeated RecipePrepTaskWithinRecipeCreationRequestInput prep_tasks = 10;
  repeated RecipeStepCreationRequestInput steps = 11;
  bool also_create_meal = 12;
  bool eligible_for_meals = 13;
  repeated RecipeMediaCreationRequestInput media = 14;
}

message RecipeMedia {
  google.protobuf.Timestamp created_at = 1;
  optional google.protobuf.Timestamp archived_at = 2;
  optional google.protobuf.Timestamp last_updated_at = 3;
  string id = 4;
  optional string belongs_to_recipe = 5;
  optional string belongs_to_recipe_step = 6;
  string mime_type = 7;
  string internal_path = 8;
  string external_path = 9;
  uint32 index = 10;
}

message RecipeMediaCreationRequestInput {
  string belongs_to_recipe = 1;
  string belongs_to_recipe_step = 2;
  string mime_type = 3;
  string internal_path = 4;
  string external_path = 5;
  uint32 index = 6;
}

message RecipeMediaUpdateRequestInput {
  optional string belongs_to_recipe = 1;
  optional string belongs_to_recipe_step = 2;
  optional string mime_type = 3;
  optional string internal_path = 4;
  optional string external_path = 5;
  optional uint32 index = 6;
}

message RecipePrepTask {
  google.protobuf.Timestamp created_at = 1;
  common.OptionalFloat32Range storage_temperature_in_celsius = 2;
  common.Uint32RangeWithOptionalMax time_buffer_before_recipe_in_seconds = 3;
  optional google.protobuf.Timestamp archived_at = 4;
  optional google.protobuf.Timestamp last_updated_at = 5;
  string id = 6;
  string storage_type = 7;
  string belongs_to_recipe = 8;
  string explicit_storage_instructions = 9;
  string notes = 10;
  string name = 11;
  string description = 12;
  repeated RecipePrepTaskStep task_steps = 13;
  bool optional = 14;
}

message RecipePrepTaskCreationRequestInput {
  common.OptionalFloat32Range storage_temperature_in_celsius = 1;
  common.Uint32RangeWithOptionalMax time_buffer_before_recipe_in_seconds = 2;
