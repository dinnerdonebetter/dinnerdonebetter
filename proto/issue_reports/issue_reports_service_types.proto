syntax = "proto3";

package issue_reports;

import "common.proto";
import "filtering.proto";
import "issue_reports/issue_reports_messages.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/issue_reports";

message IssueReportCreationRequestInput {
  string issue_type = 1;
  string details = 2;
  string relevant_table = 3;
  string relevant_record_id = 4;
}

message IssueReportUpdateRequestInput {
  optional string issue_type = 1;
  optional string details = 2;
  optional string relevant_table = 3;
  optional string relevant_record_id = 4;
}

message CreateIssueReportRequest {
  IssueReportCreationRequestInput input = 1;
}

message CreateIssueReportResponse {
  common.ResponseDetails response_details = 1;
  IssueReport created = 2;
}

message GetIssueReportRequest {
  string issue_report_id = 1;
}

message GetIssueReportResponse {
  common.ResponseDetails response_details = 1;
  IssueReport result = 2;
}

message GetIssueReportsRequest {
  filtering.QueryFilter filter = 1;
}

message GetIssueReportsResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated IssueReport results = 3;
}

message GetIssueReportsForAccountRequest {
  string account_id = 1;
  filtering.QueryFilter filter = 2;
}

message GetIssueReportsForAccountResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated IssueReport results = 3;
}

message GetIssueReportsForTableRequest {
  string table_name = 1;
  filtering.QueryFilter filter = 2;
}

message GetIssueReportsForTableResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated IssueReport results = 3;
}

message GetIssueReportsForRecordRequest {
  string table_name = 1;
  string record_id = 2;
  filtering.QueryFilter filter = 3;
}

message GetIssueReportsForRecordResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated IssueReport results = 3;
}

message UpdateIssueReportRequest {
  string issue_report_id = 1;
  IssueReportUpdateRequestInput input = 2;
}

message UpdateIssueReportResponse {
  common.ResponseDetails response_details = 1;
  IssueReport updated = 2;
}

message ArchiveIssueReportRequest {
  string issue_report_id = 1;
}

message ArchiveIssueReportResponse {
  common.ResponseDetails response_details = 1;
}
