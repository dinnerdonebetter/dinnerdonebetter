syntax = "proto3";

package audit;

import "common.proto";
import "filtering.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/audit";

message DataCollection {
  map<string, AuditLogEntry> account_audit_log_entries = 5;
  repeated AuditLogEntry user_audit_log_entries = 9;
}

message ChangeLog {
  string old_value = 1;
  string new_value = 2;
}

message AuditLogEntry {
  google.protobuf.Timestamp created_at = 1;
  map<string, ChangeLog> changes = 2;
  string belongs_to_account = 3;
  string id = 4;
  string resource_type = 5;
  string relevant_id = 6;
  string event_type = 7;
  string belongs_to_user = 8;
}

// GetAuditLogEntriesForAccount
message GetAuditLogEntriesForAccountRequest {
  filtering.QueryFilter filter = 1;
}

message GetAuditLogEntriesForAccountResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated AuditLogEntry results = 3;
}

// GetAuditLogEntriesForUser
message GetAuditLogEntriesForUserRequest {
  filtering.QueryFilter filter = 1;
}

message GetAuditLogEntriesForUserResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated AuditLogEntry results = 3;
}

// GetAuditLogEntryByID
message GetAuditLogEntryByIDRequest {
  string audit_log_entry_id = 1;
}

message GetAuditLogEntryByIDResponse {
  common.ResponseDetails response_details = 1;
  AuditLogEntry result = 2;
}

service AuditService {
  rpc GetAuditLogEntriesForAccount(GetAuditLogEntriesForAccountRequest) returns (GetAuditLogEntriesForAccountResponse);
  rpc GetAuditLogEntriesForUser(GetAuditLogEntriesForUserRequest) returns (GetAuditLogEntriesForUserResponse);
  rpc GetAuditLogEntryByID(GetAuditLogEntryByIDRequest) returns (GetAuditLogEntryByIDResponse);
}
