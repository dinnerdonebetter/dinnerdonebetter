syntax = "proto3";

package filtering;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/filtering";

message QueryFilter {
  optional string SortBy = 1;
  optional google.protobuf.Timestamp CreatedAfter = 3;
  optional google.protobuf.Timestamp CreatedBefore = 4;
  optional google.protobuf.Timestamp UpdatedAfter = 5;
  optional google.protobuf.Timestamp UpdatedBefore = 6;
  optional uint32 PageSize = 7;
  optional bool IncludeArchived = 8;
  optional string Cursor = 9;
}

message Pagination {
  uint32 Limit = 1;
  uint64 FilteredCount = 2;
  uint64 TotalCount = 3;
  string Cursor = 4;
  QueryFilter AppliedQueryFilter = 5;
}
