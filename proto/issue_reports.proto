syntax = "proto3";

package issue_reports;

import "common.proto";
import "filtering.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/issue_reports";

message DataCollection {
  map<string, IssueReport> issue_reports = 1;
}

message IssueReport {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp archived_at = 2;
  google.protobuf.Timestamp last_updated_at = 3;
  string id = 4;
  string issue_type = 5;
  string details = 6;
  string relevant_table = 7;
  string relevant_record_id = 8;
  string created_by_user = 9;
  string belongs_to_account = 10;
}

message IssueReportCreationRequestInput {
  string issue_type = 1;
  string details = 2;
  string relevant_table = 3;
  string relevant_record_id = 4;
}

message IssueReportUpdateRequestInput {
  optional string issue_type = 1;
  optional string details = 2;
  optional string relevant_table = 3;
  optional string relevant_record_id = 4;
}

// CreateIssueReport
message CreateIssueReportRequest {
  IssueReportCreationRequestInput input = 1;
}

message CreateIssueReportResponse {
  common.ResponseDetails response_details = 1;
  IssueReport created = 2;
}

// GetIssueReport
message GetIssueReportRequest {
  string issue_report_id = 1;
}

message GetIssueReportResponse {
  common.ResponseDetails response_details = 1;
  IssueReport result = 2;
}

// GetIssueReports
message GetIssueReportsRequest {
  filtering.QueryFilter filter = 1;
}

message GetIssueReportsResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated IssueReport results = 3;
}

// GetIssueReportsForAccount
message GetIssueReportsForAccountRequest {
  string account_id = 1;
  filtering.QueryFilter filter = 2;
}

message GetIssueReportsForAccountResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated IssueReport results = 3;
}

// GetIssueReportsForTable
message GetIssueReportsForTableRequest {
  string table_name = 1;
  filtering.QueryFilter filter = 2;
}

message GetIssueReportsForTableResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated IssueReport results = 3;
}

// GetIssueReportsForRecord
message GetIssueReportsForRecordRequest {
  string table_name = 1;
  string record_id = 2;
  filtering.QueryFilter filter = 3;
}

message GetIssueReportsForRecordResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated IssueReport results = 3;
}

// UpdateIssueReport
message UpdateIssueReportRequest {
  string issue_report_id = 1;
  IssueReportUpdateRequestInput input = 2;
}

message UpdateIssueReportResponse {
  common.ResponseDetails response_details = 1;
  IssueReport updated = 2;
}

// ArchiveIssueReport
message ArchiveIssueReportRequest {
  string issue_report_id = 1;
}

message ArchiveIssueReportResponse {
  common.ResponseDetails response_details = 1;
}

service IssueReportsService {
  rpc CreateIssueReport(CreateIssueReportRequest) returns (CreateIssueReportResponse);
  rpc GetIssueReport(GetIssueReportRequest) returns (GetIssueReportResponse);
  rpc GetIssueReports(GetIssueReportsRequest) returns (GetIssueReportsResponse);
  rpc GetIssueReportsForAccount(GetIssueReportsForAccountRequest) returns (GetIssueReportsForAccountResponse);
  rpc GetIssueReportsForTable(GetIssueReportsForTableRequest) returns (GetIssueReportsForTableResponse);
  rpc GetIssueReportsForRecord(GetIssueReportsForRecordRequest) returns (GetIssueReportsForRecordResponse);
  rpc UpdateIssueReport(UpdateIssueReportRequest) returns (UpdateIssueReportResponse);
  rpc ArchiveIssueReport(ArchiveIssueReportRequest) returns (ArchiveIssueReportResponse);
}
