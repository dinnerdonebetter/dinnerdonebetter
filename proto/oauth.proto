syntax = "proto3";

package oauth;

import "common.proto";
import "filtering.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/oauth";

// CreateOAuth2Client
message CreateOAuth2ClientRequest {
  OAuth2ClientCreationRequestInput input = 1;
}

message CreateOAuth2ClientResponse {
  common.ResponseDetails response_details = 1;
  OAuth2Client created = 2;
}

// ArchiveOAuth2Client
message ArchiveOAuth2ClientRequest {
  string oauth2_client_id = 1;
}

message ArchiveOAuth2ClientResponse {
  common.ResponseDetails response_details = 1;
}

// GetOAuth2Client
message GetOAuth2ClientRequest {
  string oauth2_client_id = 1;
}

message GetOAuth2ClientResponse {
  common.ResponseDetails response_details = 1;
  OAuth2Client result = 2;
}

// GetOAuth2Clients
message GetOAuth2ClientsRequest {
  filtering.QueryFilter filter = 1;
}

message GetOAuth2ClientsResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated OAuth2Client results = 3;
}

message OAuth2Client {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp archived_at = 2;
  string name = 3;
  string description = 4;
  string client_id = 5;
  string id = 6;
  string client_secret = 7;
}

message OAuth2ClientCreationRequestInput {
  string name = 1;
  string description = 2;
}

message OAuth2ClientCreationResponse {
  string client_id = 1;
  string client_secret = 2;
  string name = 3;
  string description = 4;
  string id = 5;
}

message OAuth2ClientToken {
  google.protobuf.Timestamp refresh_created_at = 1;
  google.protobuf.Timestamp access_created_at = 2;
  google.protobuf.Timestamp code_created_at = 3;
  string redirect_uri = 4;
  string scope = 5;
  string code = 6;
  string code_challenge = 7;
  string code_challenge_method = 8;
  string belongs_to_user = 9;
  string access = 10;
  string client_id = 11;
  string refresh = 12;
  string id = 13;
  google.protobuf.Duration code_expires_at = 14;
  google.protobuf.Duration access_expires_at = 15;
  google.protobuf.Duration refresh_expires_at = 16;
}

service OAuthService {
  rpc ArchiveOAuth2Client(ArchiveOAuth2ClientRequest) returns (ArchiveOAuth2ClientResponse);
  rpc CreateOAuth2Client(CreateOAuth2ClientRequest) returns (CreateOAuth2ClientResponse);
  rpc GetOAuth2Client(GetOAuth2ClientRequest) returns (GetOAuth2ClientResponse);
  rpc GetOAuth2Clients(GetOAuth2ClientsRequest) returns (GetOAuth2ClientsResponse);
}
