syntax = "proto3";

package webhooks;

import "common.proto";
import "filtering.proto";
import "google/protobuf/any.proto";
import "webhooks/webhooks_messages.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/webhooks";

message WebhookCreationRequestInput {
  string name = 1;
  WebhookContentType content_type = 2;
  string url = 3;
  WebhookMethod method = 4;
  repeated WebhookTriggerEventCreationRequestInput events = 5;
}

message WebhookExecutionRequest {
  string request_id = 1;
  google.protobuf.Any payload = 2;
  string webhook_id = 3;
  string account_id = 4;
  string trigger_event = 5;
}

message WebhookTriggerConfigCreationRequestInput {
  string belongs_to_webhook = 1;
  string trigger_event_id = 2;
}

message CreateWebhookRequest {
  WebhookCreationRequestInput input = 1;
}

message CreateWebhookResponse {
  common.ResponseDetails response_details = 1;
  Webhook created = 2;
}

message AddWebhookTriggerConfigRequest {
  string webhook_id = 1;
  WebhookTriggerConfigCreationRequestInput input = 2;
}

message AddWebhookTriggerConfigResponse {
  common.ResponseDetails response_details = 1;
  WebhookTriggerConfig created = 2;
}

message ArchiveWebhookRequest {
  string webhook_id = 1;
}

message ArchiveWebhookResponse {
  common.ResponseDetails response_details = 1;
}

message ArchiveWebhookTriggerConfigRequest {
  string webhook_id = 1;
  string webhook_trigger_config_id = 2;
}

message ArchiveWebhookTriggerConfigResponse {
  common.ResponseDetails response_details = 1;
}

message GetWebhookRequest {
  string webhook_id = 1;
}

message GetWebhookResponse {
  common.ResponseDetails response_details = 1;
  Webhook result = 2;
}

message GetWebhooksRequest {
  filtering.QueryFilter filter = 1;
}

message GetWebhooksResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated Webhook results = 3;
}

// Catalog trigger event CRUD
// When id is set, the existing catalog event is used; otherwise name (and optionally description) create a new catalog event.
message WebhookTriggerEventCreationRequestInput {
  optional string id = 3; // reference existing catalog event by id
  string name = 1;
  string description = 2;
}

message CreateWebhookTriggerEventRequest {
  WebhookTriggerEventCreationRequestInput input = 1;
}

message CreateWebhookTriggerEventResponse {
  common.ResponseDetails response_details = 1;
  WebhookTriggerEvent created = 2;
}

message GetWebhookTriggerEventRequest {
  string id = 1;
}

message GetWebhookTriggerEventResponse {
  common.ResponseDetails response_details = 1;
  WebhookTriggerEvent result = 2;
}

message GetWebhookTriggerEventsRequest {
  filtering.QueryFilter filter = 1;
}

message GetWebhookTriggerEventsResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated WebhookTriggerEvent results = 3;
}

message WebhookTriggerEventUpdateRequestInput {
  string name = 1;
  string description = 2;
}

message UpdateWebhookTriggerEventRequest {
  string id = 1;
  WebhookTriggerEventUpdateRequestInput input = 2;
}

message UpdateWebhookTriggerEventResponse {
  common.ResponseDetails response_details = 1;
}

message ArchiveWebhookTriggerEventRequest {
  string id = 1;
}

message ArchiveWebhookTriggerEventResponse {
  common.ResponseDetails response_details = 1;
}
