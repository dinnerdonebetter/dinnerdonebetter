syntax = "proto3";

package webhooks;

import "webhooks/webhooks_service_types.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/webhooks";

service WebhooksService {
  rpc ArchiveWebhook(ArchiveWebhookRequest) returns (ArchiveWebhookResponse);
  rpc ArchiveWebhookTriggerEvent(ArchiveWebhookTriggerEventRequest) returns (ArchiveWebhookTriggerEventResponse);
  rpc CreateWebhook(CreateWebhookRequest) returns (CreateWebhookResponse);
  rpc AddWebhookTriggerEvent(AddWebhookTriggerEventRequest) returns (AddWebhookTriggerEventResponse);
  rpc GetWebhook(GetWebhookRequest) returns (GetWebhookResponse);
  rpc GetWebhooks(GetWebhooksRequest) returns (GetWebhooksResponse);
}
