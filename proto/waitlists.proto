syntax = "proto3";

package waitlists;

import "common.proto";
import "filtering.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/waitlists";

message Waitlist {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp last_updated_at = 2;
  google.protobuf.Timestamp archived_at = 3;
  string id = 4;
  string name = 5;
  string description = 6;
  google.protobuf.Timestamp valid_until = 7;
}

message WaitlistSignup {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp last_updated_at = 2;
  google.protobuf.Timestamp archived_at = 3;
  string id = 4;
  string notes = 5;
  string belongs_to_waitlist = 6;
  string belongs_to_user = 7;
  string belongs_to_account = 8;
}

message WaitlistCreationRequestInput {
  string name = 1;
  string description = 2;
  google.protobuf.Timestamp valid_until = 3;
}

message WaitlistUpdateRequestInput {
  optional string name = 1;
  optional string description = 2;
  optional google.protobuf.Timestamp valid_until = 3;
}

message WaitlistSignupCreationRequestInput {
  string notes = 1;
  string belongs_to_waitlist = 2;
  string belongs_to_user = 3;
  string belongs_to_account = 4;
}

message WaitlistSignupUpdateRequestInput {
  optional string notes = 1;
}

// CreateWaitlist
message CreateWaitlistRequest {
  WaitlistCreationRequestInput input = 1;
}

message CreateWaitlistResponse {
  common.ResponseDetails response_details = 1;
  Waitlist created = 2;
}

// GetWaitlist
message GetWaitlistRequest {
  string waitlist_id = 1;
}

message GetWaitlistResponse {
  common.ResponseDetails response_details = 1;
  Waitlist result = 2;
}

// GetWaitlists
message GetWaitlistsRequest {
  filtering.QueryFilter filter = 1;
}

message GetWaitlistsResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated Waitlist results = 3;
}

// GetActiveWaitlists
message GetActiveWaitlistsRequest {
  filtering.QueryFilter filter = 1;
}

message GetActiveWaitlistsResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated Waitlist results = 3;
}

// UpdateWaitlist
message UpdateWaitlistRequest {
  string waitlist_id = 1;
  WaitlistUpdateRequestInput input = 2;
}

message UpdateWaitlistResponse {
  common.ResponseDetails response_details = 1;
  Waitlist updated = 2;
}

// ArchiveWaitlist
message ArchiveWaitlistRequest {
  string waitlist_id = 1;
}

message ArchiveWaitlistResponse {
  common.ResponseDetails response_details = 1;
}

// WaitlistIsNotExpired
message WaitlistIsNotExpiredRequest {
  string waitlist_id = 1;
}

message WaitlistIsNotExpiredResponse {
  common.ResponseDetails response_details = 1;
  bool is_not_expired = 2;
}

// CreateWaitlistSignup
message CreateWaitlistSignupRequest {
  WaitlistSignupCreationRequestInput input = 1;
}

message CreateWaitlistSignupResponse {
  common.ResponseDetails response_details = 1;
  WaitlistSignup created = 2;
}

// GetWaitlistSignup
message GetWaitlistSignupRequest {
  string waitlist_signup_id = 1;
  string waitlist_id = 2;
}

message GetWaitlistSignupResponse {
  common.ResponseDetails response_details = 1;
  WaitlistSignup result = 2;
}

// GetWaitlistSignupsForWaitlist
message GetWaitlistSignupsForWaitlistRequest {
  string waitlist_id = 1;
  filtering.QueryFilter filter = 2;
}

message GetWaitlistSignupsForWaitlistResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated WaitlistSignup results = 3;
}

// UpdateWaitlistSignup
message UpdateWaitlistSignupRequest {
  string waitlist_signup_id = 1;
  string waitlist_id = 2;
  WaitlistSignupUpdateRequestInput input = 3;
}

message UpdateWaitlistSignupResponse {
  common.ResponseDetails response_details = 1;
  WaitlistSignup updated = 2;
}

// ArchiveWaitlistSignup
message ArchiveWaitlistSignupRequest {
  string waitlist_signup_id = 1;
}

message ArchiveWaitlistSignupResponse {
  common.ResponseDetails response_details = 1;
}

service WaitlistsService {
  rpc CreateWaitlist(CreateWaitlistRequest) returns (CreateWaitlistResponse);
  rpc GetWaitlist(GetWaitlistRequest) returns (GetWaitlistResponse);
  rpc GetWaitlists(GetWaitlistsRequest) returns (GetWaitlistsResponse);
  rpc GetActiveWaitlists(GetActiveWaitlistsRequest) returns (GetActiveWaitlistsResponse);
  rpc UpdateWaitlist(UpdateWaitlistRequest) returns (UpdateWaitlistResponse);
  rpc ArchiveWaitlist(ArchiveWaitlistRequest) returns (ArchiveWaitlistResponse);
  rpc WaitlistIsNotExpired(WaitlistIsNotExpiredRequest) returns (WaitlistIsNotExpiredResponse);
  rpc CreateWaitlistSignup(CreateWaitlistSignupRequest) returns (CreateWaitlistSignupResponse);
  rpc GetWaitlistSignup(GetWaitlistSignupRequest) returns (GetWaitlistSignupResponse);
  rpc GetWaitlistSignupsForWaitlist(GetWaitlistSignupsForWaitlistRequest) returns (GetWaitlistSignupsForWaitlistResponse);
  rpc UpdateWaitlistSignup(UpdateWaitlistSignupRequest) returns (UpdateWaitlistSignupResponse);
  rpc ArchiveWaitlistSignup(ArchiveWaitlistSignupRequest) returns (ArchiveWaitlistSignupResponse);
}
