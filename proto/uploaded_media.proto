syntax = "proto3";

package uploaded_media;

import "common.proto";
import "filtering.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/uploaded_media";

message DataCollection {
  map<string, UploadedMedia> uploaded_media = 1;
}

enum UploadedMediaMimeType {
  UPLOADED_MEDIA_MIME_TYPE_UNSPECIFIED = 0;
  UPLOADED_MEDIA_MIME_TYPE_IMAGE_PNG = 1;
  UPLOADED_MEDIA_MIME_TYPE_IMAGE_JPEG = 2;
  UPLOADED_MEDIA_MIME_TYPE_IMAGE_GIF = 3;
  UPLOADED_MEDIA_MIME_TYPE_VIDEO_MP4 = 4;
}

message UploadedMedia {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp archived_at = 2;
  google.protobuf.Timestamp last_updated_at = 3;
  string id = 4;
  string storage_path = 5;
  UploadedMediaMimeType mime_type = 6;
  string created_by_user = 7;
}

message UploadedMediaCreationRequestInput {
  string storage_path = 1;
  UploadedMediaMimeType mime_type = 2;
}

message UploadedMediaUpdateRequestInput {
  optional string storage_path = 1;
  optional UploadedMediaMimeType mime_type = 2;
}

// CreateUploadedMedia
message CreateUploadedMediaRequest {
  UploadedMediaCreationRequestInput input = 1;
}

message CreateUploadedMediaResponse {
  common.ResponseDetails response_details = 1;
  UploadedMedia created = 2;
}

// GetUploadedMedia
message GetUploadedMediaRequest {
  string uploaded_media_id = 1;
}

message GetUploadedMediaResponse {
  common.ResponseDetails response_details = 1;
  UploadedMedia result = 2;
}

// GetUploadedMediaWithIDs
message GetUploadedMediaWithIDsRequest {
  repeated string ids = 1;
}

message GetUploadedMediaWithIDsResponse {
  common.ResponseDetails response_details = 1;
  repeated UploadedMedia results = 2;
}

// GetUploadedMediaForUser
message GetUploadedMediaForUserRequest {
  string user_id = 1;
  filtering.QueryFilter filter = 2;
}

message GetUploadedMediaForUserResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated UploadedMedia results = 3;
}

// UpdateUploadedMedia
message UpdateUploadedMediaRequest {
  string uploaded_media_id = 1;
  UploadedMediaUpdateRequestInput input = 2;
}

message UpdateUploadedMediaResponse {
  common.ResponseDetails response_details = 1;
  UploadedMedia updated = 2;
}

// ArchiveUploadedMedia
message ArchiveUploadedMediaRequest {
  string uploaded_media_id = 1;
}

message ArchiveUploadedMediaResponse {
  common.ResponseDetails response_details = 1;
}

service UploadedMediaService {
  rpc CreateUploadedMedia(CreateUploadedMediaRequest) returns (CreateUploadedMediaResponse);
  rpc GetUploadedMedia(GetUploadedMediaRequest) returns (GetUploadedMediaResponse);
  rpc GetUploadedMediaWithIDs(GetUploadedMediaWithIDsRequest) returns (GetUploadedMediaWithIDsResponse);
  rpc GetUploadedMediaForUser(GetUploadedMediaForUserRequest) returns (GetUploadedMediaForUserResponse);
  rpc UpdateUploadedMedia(UpdateUploadedMediaRequest) returns (UpdateUploadedMediaResponse);
  rpc ArchiveUploadedMedia(ArchiveUploadedMediaRequest) returns (ArchiveUploadedMediaResponse);
}

