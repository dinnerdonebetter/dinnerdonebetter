syntax = "proto3";

package analytics;

import "common.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/analytics";

message TrackEventRequest {
  string source = 1;
  string event = 2;
  map<string, string> properties = 3;
}

message TrackEventResponse {
  common.ResponseDetails response_details = 1;
}

message TrackAnonymousEventRequest {
  string source = 1;
  string event = 2;
  string anonymous_id = 3;
  map<string, string> properties = 4;
}

message TrackAnonymousEventResponse {
  common.ResponseDetails response_details = 1;
}
