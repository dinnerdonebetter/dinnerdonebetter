syntax = "proto3";

package analytics;

import "analytics/analytics_service_types.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/analytics";

service AnalyticsService {
  rpc TrackEvent(TrackEventRequest) returns (TrackEventResponse);
  rpc TrackAnonymousEvent(TrackAnonymousEventRequest) returns (TrackAnonymousEventResponse);
}
