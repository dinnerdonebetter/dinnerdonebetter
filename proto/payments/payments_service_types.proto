syntax = "proto3";

package payments;

import "common.proto";
import "filtering.proto";
import "google/protobuf/timestamp.proto";
import "payments/payments_messages.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/payments";

message ProductCreationRequestInput {
  string name = 1;
  string description = 2;
  string kind = 3;
  int32 amount_cents = 4;
  string currency = 5;
  optional int32 billing_interval_months = 6;
  string external_product_id = 7;
}

message ProductUpdateRequestInput {
  optional string name = 1;
  optional string description = 2;
  optional string kind = 3;
  optional int32 amount_cents = 4;
  optional string currency = 5;
  optional int32 billing_interval_months = 6;
  optional string external_product_id = 7;
}

message SubscriptionCreationRequestInput {
  string belongs_to_account = 1;
  string product_id = 2;
  string external_subscription_id = 3;
  string status = 4;
  google.protobuf.Timestamp current_period_start = 5;
  google.protobuf.Timestamp current_period_end = 6;
}

message SubscriptionUpdateRequestInput {
  optional string status = 1;
  optional google.protobuf.Timestamp current_period_start = 2;
  optional google.protobuf.Timestamp current_period_end = 3;
}

message CheckoutSessionRequestInput {
  string product_id = 1;
  string account_id = 2;
  string success_url = 3;
  string cancel_url = 4;
  bool is_recurring = 5;
}

message CreateProductRequest {
  ProductCreationRequestInput input = 1;
}

message CreateProductResponse {
  common.ResponseDetails response_details = 1;
  Product created = 2;
}

message GetProductRequest {
  string product_id = 1;
}

message GetProductResponse {
  common.ResponseDetails response_details = 1;
  Product result = 2;
}

message GetProductsRequest {
  filtering.QueryFilter filter = 1;
}

message GetProductsResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated Product results = 3;
}

message UpdateProductRequest {
  string product_id = 1;
  ProductUpdateRequestInput input = 2;
}

message UpdateProductResponse {
  common.ResponseDetails response_details = 1;
}

message ArchiveProductRequest {
  string product_id = 1;
}

message ArchiveProductResponse {
  common.ResponseDetails response_details = 1;
}

message CreateSubscriptionRequest {
  SubscriptionCreationRequestInput input = 1;
}

message CreateSubscriptionResponse {
  common.ResponseDetails response_details = 1;
  Subscription created = 2;
}

message GetSubscriptionRequest {
  string subscription_id = 1;
}

message GetSubscriptionResponse {
  common.ResponseDetails response_details = 1;
  Subscription result = 2;
}

message GetSubscriptionsForAccountRequest {
  string account_id = 1;
  filtering.QueryFilter filter = 2;
}

message GetSubscriptionsForAccountResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated Subscription results = 3;
}

message UpdateSubscriptionRequest {
  string subscription_id = 1;
  SubscriptionUpdateRequestInput input = 2;
}

message UpdateSubscriptionResponse {
  common.ResponseDetails response_details = 1;
}

message ArchiveSubscriptionRequest {
  string subscription_id = 1;
}

message ArchiveSubscriptionResponse {
  common.ResponseDetails response_details = 1;
}

message CancelSubscriptionRequest {
  string subscription_id = 1;
}

message CancelSubscriptionResponse {
  common.ResponseDetails response_details = 1;
}

message CreateCheckoutSessionRequest {
  CheckoutSessionRequestInput input = 1;
}

message CreateCheckoutSessionResponse {
  common.ResponseDetails response_details = 1;
  string session_url = 2;
  string session_id = 3;
}

message GetPurchasesForAccountRequest {
  string account_id = 1;
  filtering.QueryFilter filter = 2;
}

message GetPurchasesForAccountResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated Purchase results = 3;
}

message GetPaymentHistoryForAccountRequest {
  string account_id = 1;
  filtering.QueryFilter filter = 2;
}

message GetPaymentHistoryForAccountResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated PaymentTransaction results = 3;
}
