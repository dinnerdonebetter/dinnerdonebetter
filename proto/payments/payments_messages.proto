syntax = "proto3";

package payments;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/payments";

message Product {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp last_updated_at = 2;
  google.protobuf.Timestamp archived_at = 3;
  string id = 4;
  string name = 5;
  string description = 6;
  string kind = 7;
  int32 amount_cents = 8;
  string currency = 9;
  optional int32 billing_interval_months = 10;
  string external_product_id = 11;
}

message Subscription {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp last_updated_at = 2;
  google.protobuf.Timestamp archived_at = 3;
  string id = 4;
  string belongs_to_account = 5;
  string product_id = 6;
  string external_subscription_id = 7;
  string status = 8;
  google.protobuf.Timestamp current_period_start = 9;
  google.protobuf.Timestamp current_period_end = 10;
}

message Purchase {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp last_updated_at = 2;
  google.protobuf.Timestamp archived_at = 3;
  string id = 4;
  string belongs_to_account = 5;
  string product_id = 6;
  int32 amount_cents = 7;
  string currency = 8;
  google.protobuf.Timestamp completed_at = 9;
  string external_transaction_id = 10;
}

message PaymentTransaction {
  string id = 1;
  string belongs_to_account = 2;
  optional string subscription_id = 3;
  optional string purchase_id = 4;
  string external_transaction_id = 5;
  int32 amount_cents = 6;
  string currency = 7;
  string status = 8;
  google.protobuf.Timestamp created_at = 9;
}
