syntax = "proto3";

package identity;

import "common.proto";
import "filtering.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/identity";

message DataCollection {
  User User = 2;
  repeated AccountInvitation ReceivedInvites = 6;
  repeated AccountInvitation SentInvites = 7;
  repeated Account Accounts = 10;
}

// ArchiveUser
message ArchiveUserRequest {
  string userID = 1;
}

message ArchiveUserResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// ArchiveUserMembership
message ArchiveUserMembershipRequest {
  string accountID = 1;
  string userID = 2;
}

message ArchiveUserMembershipResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// CreateUser
message CreateUserRequest {
  UserRegistrationInput Input = 1;
}

message CreateUserResponse {
  common.ResponseDetails ResponseDetails = 1;
  google.protobuf.Timestamp CreatedAt = 2;
  google.protobuf.Timestamp Birthday = 3;
  string Username = 4;
  string EmailAddress = 5;
  string TwoFactorQRCode = 6;
  string CreatedUserID = 7;
  string AccountStatus = 8;
  string TwoFactorSecret = 9;
  string FirstName = 10;
  string LastName = 11;
}

// CreateAccount
message CreateAccountRequest {
  AccountCreationRequestInput Input = 1;
}

message CreateAccountResponse {
  common.ResponseDetails ResponseDetails = 1;
  Account Created = 2;
}

// CreateAccountInvitation
message CreateAccountInvitationRequest {
  string accountID = 1;
  AccountInvitationCreationRequestInput input = 2;
}

message CreateAccountInvitationResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// CancelAccountInvitation
message CancelAccountInvitationRequest {
  string accountInvitationID = 1;
  AccountInvitationUpdateRequestInput input = 2;
}

message CancelAccountInvitationResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// ArchiveAccount
message ArchiveAccountRequest {
  string accountID = 1;
}

message ArchiveAccountResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// AcceptAccountInvitation
message AcceptAccountInvitationRequest {
  string accountInvitationID = 1;
  AccountInvitationUpdateRequestInput input = 2;
}

message AcceptAccountInvitationResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// GetAccount
message GetAccountRequest {
  string accountID = 1;
}

message GetAccountResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// GetAccountInvitation
message GetAccountInvitationRequest {
  string accountInvitationID = 1;
}

message GetAccountInvitationResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// GetAccountInvitationByID
message GetAccountInvitationByIDRequest {
  string accountID = 1;
  string accountInvitationID = 2;
}

message GetAccountInvitationByIDResponse {
  common.ResponseDetails ResponseDetails = 1;
  AccountInvitation Result = 2;
}

// GetAccounts
message GetAccountsRequest {
  filtering.QueryFilter Filter = 1;
}

message GetAccountsResponse {
  common.ResponseDetails ResponseDetails = 1;
  filtering.QueryFilter Filter = 2;
  repeated Account Result = 3;
}

// GetReceivedAccountInvitations
message GetReceivedAccountInvitationsRequest {
  filtering.QueryFilter Filter = 1;
}

message GetReceivedAccountInvitationsResponse {
  common.ResponseDetails ResponseDetails = 1;
  filtering.QueryFilter Filter = 2;
  repeated AccountInvitation Result = 3;
}

// GetSentAccountInvitations
message GetSentAccountInvitationsRequest {
  filtering.QueryFilter Filter = 1;
}

message GetSentAccountInvitationsResponse {
  common.ResponseDetails ResponseDetails = 1;
  filtering.QueryFilter Filter = 2;
  repeated AccountInvitation Result = 3;
}

// GetUser
message GetUserRequest {
  string userID = 1;
}

message GetUserResponse {
  common.ResponseDetails ResponseDetails = 1;
  User Result = 2;
}

// GetUsers
message GetUsersRequest {
  filtering.QueryFilter Filter = 1;
}

message GetUsersResponse {
  common.ResponseDetails ResponseDetails = 1;
  filtering.QueryFilter Filter = 2;
  repeated User Result = 3;
}

// RejectAccountInvitation
message RejectAccountInvitationRequest {
  string accountInvitationID = 1;
  AccountInvitationUpdateRequestInput input = 2;
}

message RejectAccountInvitationResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// SearchForUsers
message SearchForUsersRequest {
  filtering.QueryFilter Filter = 1;
  string Query = 2;
}

message SearchForUsersResponse {
  common.ResponseDetails ResponseDetails = 1;
  filtering.QueryFilter Filter = 2;
  repeated User Result = 3;
}

// SetDefaultAccount
message SetDefaultAccountRequest {
  string AccountID = 1;
}

message SetDefaultAccountResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// TransferAccountOwnership
message TransferAccountOwnershipRequest {
  string accountID = 1;
  AccountOwnershipTransferInput input = 2;
}

message TransferAccountOwnershipResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// UpdateAccount
message UpdateAccountRequest {
  string accountID = 1;
  AccountUpdateRequestInput input = 2;
}

message UpdateAccountResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// UpdateAccountMemberPermissions
message UpdateAccountMemberPermissionsRequest {
  string accountID = 1;
  string userID = 2;
  ModifyUserPermissionsInput input = 3;
}

message UpdateAccountMemberPermissionsResponse {
  common.ResponseDetails ResponseDetails = 1;
}

message ModifyUserPermissionsInput {
  string Reason = 1;
  string NewRole = 2;
}

// UpdateUserDetails
message UserDetailsUpdateRequestInput {
  string FirstName = 1;
  string LastName = 2;
  google.protobuf.Timestamp Birthday = 3;
  string CurrentPassword = 4;
  string TOTPToken = 5;
}

message UpdateUserDetailsRequest {
  UserDetailsUpdateRequestInput Input = 1;
}

message UpdateUserDetailsResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// UpdateUserEmailAddress
message UpdateUserEmailAddressRequest {
  string NewEmailAddress = 1;
  string CurrentPassword = 2;
  string TOTPToken = 3;
}
message UpdateUserEmailAddressResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// UpdateUserUsername
message UpdateUserUsernameRequest {
  string NewUsername = 1;
}

message UpdateUserUsernameResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// UploadUserAvatar
message UploadUserAvatarRequest {
  bytes data = 1;
}

message UploadUserAvatarResponse {
  common.ResponseDetails ResponseDetails = 1;
}

message UpdateUserAvatarRequest {
  string Base64EncodedData = 1;
}

message Account {
  google.protobuf.Timestamp CreatedAt = 1;
  optional string SubscriptionPlanID = 2;
  google.protobuf.Timestamp LastUpdatedAt = 3;
  google.protobuf.Timestamp ArchivedAt = 4;
  optional float Longitude = 5;
  optional float Latitude = 6;
  string State = 7;
  string ContactPhone = 8;
  string City = 9;
  string AddressLine1 = 10;
  string ZipCode = 11;
  string Country = 12;
  string BillingStatus = 13;
  string AddressLine2 = 14;
  string PaymentProcessorCustomerID = 15;
  string BelongsToUser = 16;
  string ID = 17;
  string Name = 18;
  string WebhookEncryptionKey = 19;
  repeated AccountUserMembershipWithUser Members = 20;
}

message AccountCreationRequestInput {
  optional float Latitude = 1;
  optional float Longitude = 2;
  string Name = 3;
  string ContactPhone = 4;
  string AddressLine1 = 5;
  string AddressLine2 = 6;
  string City = 7;
  string State = 8;
  string ZipCode = 9;
  string Country = 10;
}

message AccountInvitation {
  google.protobuf.Timestamp CreatedAt = 1;
  google.protobuf.Timestamp LastUpdatedAt = 2;
  google.protobuf.Timestamp ArchivedAt = 3;
  string ToUser = 4;
  string Status = 5;
  string ToEmail = 6;
  string StatusNote = 7;
  string Token = 8;
  string ID = 9;
  string Note = 10;
  string ToName = 11;
  google.protobuf.Timestamp ExpiresAt = 12;
  Account DestinationAccount = 13;
  User FromUser = 14;
}

message AccountInvitationCreationRequestInput {
  google.protobuf.Timestamp ExpiresAt = 1;
  string Note = 2;
  string ToEmail = 3;
  string ToName = 4;
}

message AccountInvitationUpdateRequestInput {
  string Token = 1;
  string Note = 2;
}

message AccountOwnershipTransferInput {
  string Reason = 1;
  string CurrentOwner = 2;
  string NewOwner = 3;
}

message AccountUpdateRequestInput {
  string Name = 1;
  string ContactPhone = 2;
  string AddressLine1 = 3;
  string AddressLine2 = 4;
  string City = 5;
  string State = 6;
  string ZipCode = 7;
  string Country = 8;
  float Latitude = 9;
  float Longitude = 10;
  string BelongsToUser = 11;
}

message AccountUserMembership {
  google.protobuf.Timestamp CreatedAt = 1;
  google.protobuf.Timestamp LastUpdatedAt = 2;
  google.protobuf.Timestamp ArchivedAt = 3;
  string ID = 4;
  string BelongsToUser = 5;
  string BelongsToAccount = 6;
  string AccountRole = 7;
  bool DefaultAccount = 8;
}

message AccountUserMembershipWithUser {
  google.protobuf.Timestamp CreatedAt = 1;
  google.protobuf.Timestamp LastUpdatedAt = 2;
  User BelongsToUser = 3;
  google.protobuf.Timestamp ArchivedAt = 4;
  string ID = 5;
  string BelongsToAccount = 6;
  string AccountRole = 7;
  bool DefaultAccount = 8;
}

message User {
  google.protobuf.Timestamp CreatedAt = 1;
  google.protobuf.Timestamp PasswordLastChangedAt = 2;
  google.protobuf.Timestamp LastUpdatedAt = 3;
  google.protobuf.Timestamp LastAcceptedTermsOfService = 4;
  google.protobuf.Timestamp LastAcceptedPrivacyPolicy = 5;
  google.protobuf.Timestamp TwoFactorSecretVerifiedAt = 6;
  optional string AvatarSrc = 7;
  google.protobuf.Timestamp Birthday = 8;
  google.protobuf.Timestamp ArchivedAt = 9;
  string AccountStatusExplanation = 10;
  string TwoFactorSecret = 11;
  string HashedPassword = 12;
  string ID = 13;
  string AccountStatus = 14;
  string Username = 15;
  string FirstName = 16;
  string LastName = 17;
  string EmailAddress = 18;
  google.protobuf.Timestamp EmailAddressVerifiedAt = 19;
  string ServiceRole = 20;
  bool RequiresPasswordChange = 21;
}

message UserAccountStatusUpdateInput {
  string NewStatus = 1;
  string Reason = 2;
  string TargetUserID = 3;
}

message UserCreationResponse {
  common.ResponseDetails ResponseDetails = 1;
  google.protobuf.Timestamp CreatedAt = 2;
  google.protobuf.Timestamp Birthday = 3;
  string Username = 4;
  string EmailAddress = 5;
  string TwoFactorQRCode = 6;
  string CreatedUserID = 7;
  string AccountStatus = 8;
  string TwoFactorSecret = 9;
  string FirstName = 10;
  string LastName = 11;
}

message UserDataAggregationRequest {
  string RequestID = 1;
  string ReportID = 2;
  string UserID = 3;
}

message UserDetailsUpdateRequest {
  string FirstName = 1;
  string LastName = 2;
  google.protobuf.Timestamp Birthday = 3;
  string CurrentPassword = 4;
  string TOTPToken = 5;
}

message UserRegistrationInput {
  google.protobuf.Timestamp Birthday = 1;
  string Password = 2;
  string EmailAddress = 3;
  string InvitationToken = 4;
  string InvitationID = 5;
  string Username = 6;
  string FirstName = 7;
  string LastName = 8;
  string AccountName = 9;
  bool AcceptedTOS = 10;
  bool AcceptedPrivacyPolicy = 11;
}

message UsernameUpdateRequest {
  string NewUsername = 1;
  string CurrentPassword = 2;
  string TOTPToken = 3;
}

// AdminUpdateUserStatus
message AdminUpdateUserStatusRequest {
  string TargetUserID = 1;
  string NewStatus = 2;
  string Reason = 3;
}

message AdminUpdateUserStatusResponse {
  common.ResponseDetails ResponseDetails = 1;
}

service IdentityService {
  rpc AdminUpdateUserStatus(AdminUpdateUserStatusRequest) returns (AdminUpdateUserStatusResponse);
  rpc AcceptAccountInvitation(AcceptAccountInvitationRequest) returns (AcceptAccountInvitationResponse);
  rpc ArchiveAccount(ArchiveAccountRequest) returns (ArchiveAccountResponse);
  rpc ArchiveUserMembership(ArchiveUserMembershipRequest) returns (ArchiveUserMembershipResponse);
  rpc ArchiveUser(ArchiveUserRequest) returns (ArchiveUserResponse);
  rpc CancelAccountInvitation(CancelAccountInvitationRequest) returns (CancelAccountInvitationResponse);
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc CreateAccountInvitation(CreateAccountInvitationRequest) returns (CreateAccountInvitationResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
  rpc GetAccountInvitation(GetAccountInvitationRequest) returns (GetAccountInvitationResponse);
  rpc GetAccountInvitationByID(GetAccountInvitationByIDRequest) returns (GetAccountInvitationByIDResponse);
  rpc GetAccounts(GetAccountsRequest) returns (GetAccountsResponse);
  rpc GetReceivedAccountInvitations(GetReceivedAccountInvitationsRequest) returns (GetReceivedAccountInvitationsResponse);
  rpc GetSentAccountInvitations(GetSentAccountInvitationsRequest) returns (GetSentAccountInvitationsResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc RejectAccountInvitation(RejectAccountInvitationRequest) returns (RejectAccountInvitationResponse);
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
  rpc SearchForUsers(SearchForUsersRequest) returns (SearchForUsersResponse);
  rpc SetDefaultAccount(SetDefaultAccountRequest) returns (SetDefaultAccountResponse);
  rpc TransferAccountOwnership(TransferAccountOwnershipRequest) returns (TransferAccountOwnershipResponse);
  rpc UpdateAccount(UpdateAccountRequest) returns (UpdateAccountResponse);
  rpc UpdateAccountMemberPermissions(UpdateAccountMemberPermissionsRequest) returns (UpdateAccountMemberPermissionsResponse);
  rpc UpdateUserDetails(UpdateUserDetailsRequest) returns (UpdateUserDetailsResponse);
  rpc UpdateUserEmailAddress(UpdateUserEmailAddressRequest) returns (UpdateUserEmailAddressResponse);
  rpc UpdateUserUsername(UpdateUserUsernameRequest) returns (UpdateUserUsernameResponse);
  rpc UploadUserAvatar(UploadUserAvatarRequest) returns (UploadUserAvatarResponse);
}
