syntax = "proto3";

package common;

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/types";

message NamedID {
  string id = 1;
  string name = 2;
}

message ResponseDetails {
  string current_account_id = 1;
  string trace_id = 2;
}

message OptionalFloat32Range {
  optional float max = 1;
  optional float min = 2;
}

message OptionalUint32Range {
  optional uint32 max = 1;
  optional uint32 min = 2;
}

message Float32RangeWithOptionalMax {
  optional float max = 1;
  float min = 2;
}

message Float32RangeWithOptionalMaxUpdateRequestInput {
  optional float min = 1;
  optional float max = 2;
}

message Uint16RangeWithOptionalMax {
  optional uint32 max = 1;
  uint32 min = 2;
}

message Uint16RangeWithOptionalMaxUpdateRequestInput {
  optional uint32 min = 1;
  optional uint32 max = 2;
}

message Uint32RangeWithOptionalMax {
  optional uint32 max = 1;
  uint32 min = 2;
}

message Uint32RangeWithOptionalMaxUpdateRequestInput {
  optional uint32 min = 1;
  optional uint32 max = 2;
}
