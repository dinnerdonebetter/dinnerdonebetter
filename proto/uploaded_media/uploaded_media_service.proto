syntax = "proto3";

package uploaded_media;

import "uploaded_media/uploaded_media_messages.proto";
import "uploaded_media/uploaded_media_service_types.proto";

option go_package = "github.com/dinnerdonebetter/dinnerdonebetter/backend/internal/grpc/generated/services/uploaded_media";

service UploadedMediaService {
  rpc Upload(stream UploadRequest) returns (UploadResponse);
  rpc CreateUploadedMedia(CreateUploadedMediaRequest) returns (CreateUploadedMediaResponse);
  rpc GetUploadedMedia(GetUploadedMediaRequest) returns (GetUploadedMediaResponse);
  rpc GetUploadedMediaWithIDs(GetUploadedMediaWithIDsRequest) returns (GetUploadedMediaWithIDsResponse);
  rpc GetUploadedMediaForUser(GetUploadedMediaForUserRequest) returns (GetUploadedMediaForUserResponse);
  rpc UpdateUploadedMedia(UpdateUploadedMediaRequest) returns (UpdateUploadedMediaResponse);
  rpc ArchiveUploadedMedia(ArchiveUploadedMediaRequest) returns (ArchiveUploadedMediaResponse);
}
