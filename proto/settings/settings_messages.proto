syntax = "proto3";

package settings;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/settings";

message DataCollection {
  map<string, ServiceSettingConfiguration> service_setting_configurations = 1;
  repeated ServiceSettingConfiguration user_service_setting_configurations = 2;
}

message ServiceSetting {
  google.protobuf.Timestamp created_at = 1;
  optional string default_value = 2;
  google.protobuf.Timestamp last_updated_at = 3;
  google.protobuf.Timestamp archived_at = 4;
  string id = 5;
  string name = 6;
  string type = 7;
  string description = 8;
  repeated string enumeration = 9;
  bool admins_only = 10;
}

message ServiceSettingConfiguration {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp last_updated_at = 2;
  google.protobuf.Timestamp archived_at = 3;
  string id = 4;
  string value = 5;
  string notes = 6;
  string belongs_to_user = 7;
  string belongs_to_account = 8;
  ServiceSetting service_setting = 9;
}
