syntax = "proto3";

package settings;

import "settings/settings_service_types.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/settings";

service SettingsService {
  rpc GetServiceSettingConfigurationsForAccount(GetServiceSettingConfigurationsForAccountRequest) returns (GetServiceSettingConfigurationsForAccountResponse);
  rpc GetServiceSettingConfigurationsForUser(GetServiceSettingConfigurationsForUserRequest) returns (GetServiceSettingConfigurationsForUserResponse);
  rpc SearchForServiceSettings(SearchForServiceSettingsRequest) returns (SearchForServiceSettingsResponse);
  rpc ArchiveServiceSetting(ArchiveServiceSettingRequest) returns (ArchiveServiceSettingResponse);
  rpc ArchiveServiceSettingConfiguration(ArchiveServiceSettingConfigurationRequest) returns (ArchiveServiceSettingConfigurationResponse);
  rpc CreateServiceSetting(CreateServiceSettingRequest) returns (CreateServiceSettingResponse);
  rpc CreateServiceSettingConfiguration(CreateServiceSettingConfigurationRequest) returns (CreateServiceSettingConfigurationResponse);
  rpc GetServiceSetting(GetServiceSettingRequest) returns (GetServiceSettingResponse);
  rpc GetServiceSettingConfigurationByName(GetServiceSettingConfigurationByNameRequest) returns (GetServiceSettingConfigurationByNameResponse);
  rpc GetServiceSettings(GetServiceSettingsRequest) returns (GetServiceSettingsResponse);
  rpc UpdateServiceSettingConfiguration(UpdateServiceSettingConfigurationRequest) returns (UpdateServiceSettingConfigurationResponse);
}
