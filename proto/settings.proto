syntax = "proto3";

package settings;

import "common.proto";
import "filtering.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/settings";

message DataCollection {
  map<string, ServiceSettingConfiguration> ServiceSettingConfigurations = 1;
  repeated ServiceSettingConfiguration UserServiceSettingConfigurations = 2;
}

// CreateServiceSetting
message CreateServiceSettingRequest {
  ServiceSettingCreationRequestInput Input = 1;
}

message CreateServiceSettingResponse {
  common.ResponseDetails ResponseDetails = 1;
  ServiceSetting Created = 2;
}

// CreateServiceSettingConfiguration
message CreateServiceSettingConfigurationRequest {
  ServiceSettingConfigurationCreationRequestInput Input = 1;
}

message CreateServiceSettingConfigurationResponse {
  common.ResponseDetails ResponseDetails = 1;
  ServiceSettingConfiguration Created = 2;
}

// ArchiveServiceSetting
message ArchiveServiceSettingRequest {
  string serviceSettingID = 1;
}

message ArchiveServiceSettingResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// ArchiveServiceSettingConfiguration
message ArchiveServiceSettingConfigurationRequest {
  string serviceSettingConfigurationID = 1;
}

message ArchiveServiceSettingConfigurationResponse {
  common.ResponseDetails ResponseDetails = 1;
}

// GetServiceSetting
message GetServiceSettingRequest {
  string serviceSettingID = 1;
}

message GetServiceSettingResponse {
  common.ResponseDetails ResponseDetails = 1;
  ServiceSetting Result = 2;
}

// GetServiceSettingConfigurationByName
message GetServiceSettingConfigurationByNameRequest {
  filtering.QueryFilter Filter = 1;
  string serviceSettingConfigurationName = 2;
}

message GetServiceSettingConfigurationByNameResponse {
  common.ResponseDetails ResponseDetails = 1;
  filtering.QueryFilter Filter = 2;
  ServiceSettingConfiguration Result = 3;
}

// GetServiceSettingConfigurationsForAccount
message GetServiceSettingConfigurationsForAccountRequest {
  filtering.QueryFilter Filter = 1;
}

message GetServiceSettingConfigurationsForAccountResponse {
  common.ResponseDetails ResponseDetails = 1;
  filtering.QueryFilter Filter = 2;
  repeated ServiceSettingConfiguration Results = 3;
}

// GetServiceSettingConfigurationsForUser
message GetServiceSettingConfigurationsForUserRequest {
  filtering.QueryFilter Filter = 1;
}

message GetServiceSettingConfigurationsForUserResponse {
  common.ResponseDetails ResponseDetails = 1;
  filtering.QueryFilter Filter = 2;
  repeated ServiceSettingConfiguration Results = 3;
}

// GetServiceSettings
message GetServiceSettingsRequest {
  filtering.QueryFilter Filter = 1;
}

message GetServiceSettingsResponse {
  common.ResponseDetails ResponseDetails = 1;
  filtering.QueryFilter Filter = 2;
  repeated ServiceSetting Results = 3;
}

// SearchForServiceSettings
message SearchForServiceSettingsRequest {
  filtering.QueryFilter Filter = 1;
  string Query = 2;
}

message SearchForServiceSettingsResponse {
  common.ResponseDetails ResponseDetails = 1;
  filtering.QueryFilter Filter = 2;
  repeated ServiceSetting Results = 3;
}

// UpdateServiceSettingConfiguration
message UpdateServiceSettingConfigurationRequest {
  string serviceSettingConfigurationID = 1;
  ServiceSettingConfigurationUpdateRequestInput input = 2;
}

message UpdateServiceSettingConfigurationResponse {
  common.ResponseDetails ResponseDetails = 1;
  ServiceSettingConfiguration Updated = 2;
}

message ServiceSetting {
  google.protobuf.Timestamp CreatedAt = 1;
  string DefaultValue = 2;
  google.protobuf.Timestamp LastUpdatedAt = 3;
  google.protobuf.Timestamp ArchivedAt = 4;
  string ID = 5;
  string Name = 6;
  string Type = 7;
  string Description = 8;
  repeated string Enumeration = 9;
  bool AdminsOnly = 10;
}

message ServiceSettingConfiguration {
  google.protobuf.Timestamp CreatedAt = 1;
  google.protobuf.Timestamp LastUpdatedAt = 2;
  google.protobuf.Timestamp ArchivedAt = 3;
  string ID = 4;
  string Value = 5;
  string Notes = 6;
  string BelongsToUser = 7;
  string BelongsToAccount = 8;
  ServiceSetting ServiceSetting = 9;
}

message ServiceSettingConfigurationCreationRequestInput {
  string Value = 1;
  string Notes = 2;
  string ServiceSettingID = 3;
  string BelongsToUser = 4;
  string BelongsToAccount = 5;
}

message ServiceSettingConfigurationUpdateRequestInput {
  optional string Value = 1;
  optional string Notes = 2;
  optional string ServiceSettingID = 3;
  optional string BelongsToUser = 4;
  optional string BelongsToAccount = 5;
}

message ServiceSettingCreationRequestInput {
  string DefaultValue = 1;
  string Name = 2;
  string Type = 3;
  string Description = 4;
  repeated string Enumeration = 5;
  bool AdminsOnly = 6;
}

service UserConfigurationService {
  rpc GetServiceSettingConfigurationsForAccount(GetServiceSettingConfigurationsForAccountRequest) returns (GetServiceSettingConfigurationsForAccountResponse);
  rpc GetServiceSettingConfigurationsForUser(GetServiceSettingConfigurationsForUserRequest) returns (GetServiceSettingConfigurationsForUserResponse);
  rpc SearchForServiceSettings(SearchForServiceSettingsRequest) returns (SearchForServiceSettingsResponse);
  rpc ArchiveServiceSetting(ArchiveServiceSettingRequest) returns (ArchiveServiceSettingResponse);
  rpc ArchiveServiceSettingConfiguration(ArchiveServiceSettingConfigurationRequest) returns (ArchiveServiceSettingConfigurationResponse);
  rpc CreateServiceSetting(CreateServiceSettingRequest) returns (CreateServiceSettingResponse);
  rpc CreateServiceSettingConfiguration(CreateServiceSettingConfigurationRequest) returns (CreateServiceSettingConfigurationResponse);
  rpc GetServiceSetting(GetServiceSettingRequest) returns (GetServiceSettingResponse);
  rpc GetServiceSettingConfigurationByName(GetServiceSettingConfigurationByNameRequest) returns (GetServiceSettingConfigurationByNameResponse);
  rpc GetServiceSettings(GetServiceSettingsRequest) returns (GetServiceSettingsResponse);
  rpc UpdateServiceSettingConfiguration(UpdateServiceSettingConfigurationRequest) returns (UpdateServiceSettingConfigurationResponse);
}
