syntax = "proto3";

package internalops;

import "common.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/internalops";

message PublishArbitraryQueueMessageRequest {
  string queue_name = 1;
  string body = 2;
}

message PublishArbitraryQueueMessageResponse {
  common.ResponseDetails response_details = 1;
  bool success = 2;
}
