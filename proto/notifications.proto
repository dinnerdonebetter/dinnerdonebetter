syntax = "proto3";

package notifications;

import "common.proto";
import "filtering.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/notifications";

// GetUserNotification
message GetUserNotificationRequest {
  string user_notification_id = 1;
}

message GetUserNotificationResponse {
  common.ResponseDetails response_details = 1;
  UserNotification result = 2;
}

// GetUserNotifications
message GetUserNotificationsRequest {
  filtering.QueryFilter filter = 1;
}

message GetUserNotificationsResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated UserNotification results = 3;
}

// UpdateUserNotification
message UpdateUserNotificationRequest {
  string user_notification_id = 1;
  UserNotificationUpdateRequestInput input = 2;
}

message UpdateUserNotificationResponse {
  common.ResponseDetails response_details = 1;
  UserNotification updated = 2;
}

enum UserNotificationStatus {
  USER_NOTIFICATION_STATUS_UNREAD = 0;
  USER_NOTIFICATION_STATUS_READ = 1;
  USER_NOTIFICATION_STATUS_DISMISSED = 2;
}

message UserNotification {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp last_updated_at = 2;
  string id = 3;
  string content = 4;
  UserNotificationStatus status = 5;
  string belongs_to_user = 6;
}

message UserNotificationCreationRequestInput {
  string content = 1;
  UserNotificationStatus status = 2;
  string belongs_to_user = 3;
}

message UserNotificationUpdateRequestInput {
  optional UserNotificationStatus status = 1;
}

service UserNotificationsService {
  rpc GetUserNotification(GetUserNotificationRequest) returns (GetUserNotificationResponse);
  rpc GetUserNotifications(GetUserNotificationsRequest) returns (GetUserNotificationsResponse);
  rpc UpdateUserNotification(UpdateUserNotificationRequest) returns (UpdateUserNotificationResponse);
}
