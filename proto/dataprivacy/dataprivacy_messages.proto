syntax = "proto3";

package dataprivacy;

import "audit/audit_messages.proto";
import "identity/identity_messages.proto";
import "issue_reports/issue_reports_messages.proto";
import "mealplanning/mealplanning_messages.proto";
import "notifications/notifications_messages.proto";
import "settings/settings_messages.proto";
import "uploaded_media/uploaded_media.proto";
import "waitlists/waitlists_messages.proto";
import "webhooks/webhooks_messages.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/dataprivacy";

message UserDataCollection {
  string report_id = 1;
  identity.DataCollection identity_data_collection = 2;
  settings.DataCollection settings_data_collection = 3;
  webhooks.DataCollection webhooks_data_collection = 4;
  mealplanning.DataCollection meal_planning_data_collection = 5;
  notifications.DataCollection notifications_data_collection = 6;
  repeated audit.AuditLogEntry audit_log_entries = 7;
  repeated issue_reports.IssueReport issue_reports = 8;
  repeated uploaded_media.UploadedMedia uploaded_media = 9;
  repeated waitlists.WaitlistSignup waitlist_signups = 10;
}
