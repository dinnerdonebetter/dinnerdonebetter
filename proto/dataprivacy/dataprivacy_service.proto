syntax = "proto3";

package dataprivacy;

import "dataprivacy/dataprivacy_service_types.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/dataprivacy";

service DataPrivacyService {
  rpc AggregateUserDataReport(AggregateUserDataReportRequest) returns (AggregateUserDataReportResponse);
  rpc DestroyAllUserData(DestroyAllUserDataRequest) returns (DestroyAllUserDataResponse);
  rpc FetchUserDataReport(FetchUserDataReportRequest) returns (FetchUserDataReportResponse);
}
