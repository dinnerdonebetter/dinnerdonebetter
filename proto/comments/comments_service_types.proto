syntax = "proto3";

package comments;

import "comments/comments_messages.proto";
import "common.proto";
import "filtering.proto";

option go_package = "github.com/dinnerdonebetter/dinnerdonebetter/backend/internal/grpc/generated/services/comments";

message CreateCommentRequest {
  CommentCreationRequestInput input = 1;
}

message CreateCommentResponse {
  common.ResponseDetails response_details = 1;
  Comment comment = 2;
}

message ArchiveCommentRequest {
  string comment_id = 1;
}

message ArchiveCommentResponse {
  common.ResponseDetails response_details = 1;
}

message GetCommentsForReferenceRequest {
  string target_type = 1;
  string referenced_id = 2;
  filtering.QueryFilter filter = 3;
}

message GetCommentsForReferenceResponse {
  common.ResponseDetails response_details = 1;
  repeated Comment data = 2;
  filtering.Pagination pagination = 3;
}

message UpdateCommentRequest {
  string comment_id = 1;
  CommentUpdateRequestInput input = 2;
}

message UpdateCommentResponse {
  common.ResponseDetails response_details = 1;
  Comment comment = 2;
}
