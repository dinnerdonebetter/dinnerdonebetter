syntax = "proto3";

package comments;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/comments";

message Comment {
  string id = 1;
  string content = 2;
  string target_type = 3;
  string referenced_id = 4;
  optional string parent_comment_id = 5;
  string belongs_to_user = 6;
  google.protobuf.Timestamp created_at = 7;
  optional google.protobuf.Timestamp last_updated_at = 8;
}

message CommentCreationRequestInput {
  string content = 1;
  optional string parent_comment_id = 2;
  string target_type = 3; // Required for CreateComment; ignored for AddCommentTo*
  string referenced_id = 4; // Required for CreateComment; ignored for AddCommentTo*
}

message CommentUpdateRequestInput {
  string content = 1;
}
