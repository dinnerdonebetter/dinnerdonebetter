syntax = "proto3";

package comments;

import "comments/comments_service_types.proto";

option go_package = "github.com/dinnerdonebetter/dinnerdonebetter/backend/internal/grpc/generated/services/comments";

service CommentsService {
  rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse);
  rpc ArchiveComment(ArchiveCommentRequest) returns (ArchiveCommentResponse);
  rpc GetCommentsForReference(GetCommentsForReferenceRequest) returns (GetCommentsForReferenceResponse);
  rpc UpdateComment(UpdateCommentRequest) returns (UpdateCommentResponse);
}
