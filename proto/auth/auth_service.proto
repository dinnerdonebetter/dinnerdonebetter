syntax = "proto3";

package auth;

import "auth/auth_service_types.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/auth";

service AuthService {
  rpc EvaluateBooleanFeatureFlag(EvaluateBooleanFeatureFlagRequest) returns (EvaluateBooleanFeatureFlagResponse);
  rpc EvaluateInt64FeatureFlag(EvaluateInt64FeatureFlagRequest) returns (EvaluateInt64FeatureFlagResponse);
  rpc EvaluateStringFeatureFlag(EvaluateStringFeatureFlagRequest) returns (EvaluateStringFeatureFlagResponse);
  rpc GetAuthStatus(GetAuthStatusRequest) returns (GetAuthStatusResponse);
  rpc ExchangeToken(ExchangeTokenRequest) returns (ExchangeTokenResponse);
  rpc AdminLoginForToken(AdminLoginForTokenRequest) returns (LoginForTokenResponse);
  rpc CheckPermissions(UserPermissionsRequestInput) returns (UserPermissionsResponse);
  rpc GetActiveAccount(GetActiveAccountRequest) returns (GetActiveAccountResponse);
  rpc GetSelf(GetSelfRequest) returns (GetSelfResponse);
  rpc LoginForToken(LoginForTokenRequest) returns (LoginForTokenResponse);
  rpc RedeemPasswordResetToken(RedeemPasswordResetTokenRequest) returns (RedeemPasswordResetTokenResponse);
  rpc RefreshTOTPSecret(RefreshTOTPSecretRequest) returns (RefreshTOTPSecretResponse);
  rpc RequestEmailVerificationEmail(RequestEmailVerificationEmailRequest) returns (RequestEmailVerificationEmailResponse);
  rpc RequestPasswordResetToken(RequestPasswordResetTokenRequest) returns (RequestPasswordResetTokenResponse);
  rpc RequestUsernameReminder(RequestUsernameReminderRequest) returns (RequestUsernameReminderResponse);
  rpc VerifyEmailAddress(VerifyEmailAddressRequest) returns (VerifyEmailAddressResponse);
  rpc VerifyTOTPSecret(VerifyTOTPSecretRequest) returns (VerifyTOTPSecretResponse);
  rpc UpdatePassword(UpdatePasswordRequest) returns (UpdatePasswordResponse);
}
