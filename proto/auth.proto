syntax = "proto3";

package auth;

import "common.proto";
import "google/protobuf/timestamp.proto";
import "identity.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/auth";

// LoginForToken
message LoginForTokenRequest {
  UserLoginInput input = 1;
}

message LoginForTokenResponse {
  common.ResponseDetails response_details = 1;
  TokenResponse result = 2;
}

// AdminLoginForToken
message AdminLoginForTokenRequest {
  UserLoginInput input = 1;
}

message AdminLoginForTokenResponse {
  common.ResponseDetails response_details = 1;
  TokenResponse result = 2;
}

// ExchangeToken
message ExchangeTokenRequest {
  string refresh_token = 1;
}

message ExchangeTokenResponse {
  common.ResponseDetails response_details = 1;
  string user_id = 2;
  string account_id = 3;
  string access_token = 4;
  string refresh_token = 5;
  google.protobuf.Timestamp expires_utc = 6;
}

// GetActiveAccount
message GetActiveAccountRequest {}

message GetActiveAccountResponse {
  common.ResponseDetails response_details = 1;
  identity.Account result = 2;
}

// GetAuthStatus
message GetAuthStatusRequest {}

message GetAuthStatusResponse {
  common.ResponseDetails response_details = 1;
  string user_id = 2;
  string account_status = 3;
  string account_status_explanation = 4;
  string active_account = 5;
}

// RedeemPasswordResetToken
message RedeemPasswordResetTokenRequest {
  string token = 1;
  string new_password = 2;
}

message RedeemPasswordResetTokenResponse {
  common.ResponseDetails response_details = 1;
}

// RefreshTOTPSecret
message RefreshTOTPSecretRequest {
  string current_password = 1;
  string totp_token = 2;
}

message RefreshTOTPSecretResponse {
  common.ResponseDetails response_details = 1;
  TOTPSecretRefreshResponse result = 2;
}

// RequestEmailVerificationEmail
message RequestEmailVerificationEmailRequest {
  string email_address = 1;
}

message RequestEmailVerificationEmailResponse {
  common.ResponseDetails response_details = 1;
  bool submitted = 2;
}

// RequestPasswordResetToken
message RequestPasswordResetTokenRequest {
  string email_address = 1;
}

message RequestPasswordResetTokenResponse {
  common.ResponseDetails response_details = 1;
  bool accepted = 2;
}

// RequestUsernameReminder
message RequestUsernameReminderRequest {
  string email_address = 1;
}

message RequestUsernameReminderResponse {
  common.ResponseDetails response_details = 1;
  bool submitted = 2;
}

// UpdatePassword
message UpdatePasswordRequest {
  string new_password = 1;
  string current_password = 2;
  string totp_token = 3;
}

message UpdatePasswordResponse {
  common.ResponseDetails response_details = 1;
}

// VerifyEmailAddress
message VerifyEmailAddressRequest {
  string token = 1;
}

message VerifyEmailAddressResponse {
  common.ResponseDetails response_details = 1;
  bool verified = 2;
}

// VerifyTOTPSecret
message VerifyTOTPSecretRequest {
  string totp_token = 1;
  string user_id = 2;
}

message VerifyTOTPSecretResponse {
  common.ResponseDetails response_details = 1;
  bool accepted = 2;
}

message ChangeActiveAccountInput {
  string account_id = 1;
}

message EmailAddressVerificationRequest {
  string token = 1;
}

message EmailAddressVerificationResponse {
  common.ResponseDetails response_details = 1;
}

message PasswordResetResponse {
  common.ResponseDetails response_details = 1;
  bool successful = 2;
}

message PasswordResetToken {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp expires_at = 2;
  google.protobuf.Timestamp redeemed_at = 3;
  google.protobuf.Timestamp last_updated_at = 4;
  string id = 5;
  string token = 6;
  string belongs_to_user = 7;
}

message PasswordResetTokenCreationRequestInput {
  string email_address = 1;
}

message PasswordResetTokenRedemptionRequestInput {
  string token = 1;
  string new_password = 2;
}

message PasswordUpdateInput {
  string new_password = 1;
  string current_password = 2;
  string totp_token = 3;
}

message TOTPSecretRefreshInput {
  string current_password = 1;
  string totp_token = 2;
}

message TOTPSecretRefreshResponse {
  string two_factor_qr_code = 2;
  string two_factor_secret = 3;
}

message TOTPSecretVerificationInput {
  string totp_token = 1;
  string user_id = 2;
}

message TOTPSecretVerificationResponse {
  common.ResponseDetails response_details = 1;
  bool accepted = 2;
}

message TokenResponse {
  string user_id = 2;
  string account_id = 3;
  string access_token = 4;
  string refresh_token = 5;
  google.protobuf.Timestamp expires_utc = 6;
}

message UserLoginInput {
  string username = 1;
  string password = 2;
  string totp_token = 3;
}

message UserPermissionsRequestInput {
  repeated string permissions = 1;
}

message UserPermissionsResponse {
  common.ResponseDetails response_details = 1;
  map<string, bool> permissions = 2;
}

message UsernameReminderRequestInput {
  string email_address = 1;
}

// GetSelf
message GetSelfRequest {}

message GetSelfResponse {
  common.ResponseDetails response_details = 1;
  identity.User result = 2;
}

service AuthService {
  rpc GetAuthStatus(GetAuthStatusRequest) returns (GetAuthStatusResponse);
  rpc ExchangeToken(ExchangeTokenRequest) returns (ExchangeTokenResponse);
  rpc AdminLoginForToken(AdminLoginForTokenRequest) returns (LoginForTokenResponse);
  rpc CheckPermissions(UserPermissionsRequestInput) returns (UserPermissionsResponse);
  rpc GetActiveAccount(GetActiveAccountRequest) returns (GetActiveAccountResponse);
  rpc GetSelf(GetSelfRequest) returns (GetSelfResponse);
  rpc LoginForToken(LoginForTokenRequest) returns (LoginForTokenResponse);
  rpc RedeemPasswordResetToken(RedeemPasswordResetTokenRequest) returns (RedeemPasswordResetTokenResponse);
  rpc RefreshTOTPSecret(RefreshTOTPSecretRequest) returns (RefreshTOTPSecretResponse);
  rpc RequestEmailVerificationEmail(RequestEmailVerificationEmailRequest) returns (RequestEmailVerificationEmailResponse);
  rpc RequestPasswordResetToken(RequestPasswordResetTokenRequest) returns (RequestPasswordResetTokenResponse);
  rpc RequestUsernameReminder(RequestUsernameReminderRequest) returns (RequestUsernameReminderResponse);
  rpc VerifyEmailAddress(VerifyEmailAddressRequest) returns (VerifyEmailAddressResponse);
  rpc VerifyTOTPSecret(VerifyTOTPSecretRequest) returns (VerifyTOTPSecretResponse);
  rpc UpdatePassword(UpdatePasswordRequest) returns (UpdatePasswordResponse);
}
