syntax = "proto3";

package oauth;

import "common.proto";
import "filtering.proto";
import "oauth/oauth_messages.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/oauth";

message CreateOAuth2ClientRequest {
  OAuth2ClientCreationRequestInput input = 1;
}

message CreateOAuth2ClientResponse {
  common.ResponseDetails response_details = 1;
  OAuth2Client created = 2;
}

message ArchiveOAuth2ClientRequest {
  string oauth2_client_id = 1;
}

message ArchiveOAuth2ClientResponse {
  common.ResponseDetails response_details = 1;
}

message GetOAuth2ClientRequest {
  string oauth2_client_id = 1;
}

message GetOAuth2ClientResponse {
  common.ResponseDetails response_details = 1;
  OAuth2Client result = 2;
}

message GetOAuth2ClientsRequest {
  filtering.QueryFilter filter = 1;
}

message GetOAuth2ClientsResponse {
  common.ResponseDetails response_details = 1;
  filtering.Pagination pagination = 2;
  repeated OAuth2Client results = 3;
}

message OAuth2ClientCreationRequestInput {
  string name = 1;
  string description = 2;
}

message OAuth2ClientCreationResponse {
  string client_id = 1;
  string client_secret = 2;
  string name = 3;
  string description = 4;
  string id = 5;
}
