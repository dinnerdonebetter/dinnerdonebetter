syntax = "proto3";

package internalops;

import "common.proto";

option go_package = "github.com/dinnerdonebetter/backend/internal/grpc/generated/services/internalops";

service InternalOperations {
  rpc PublishArbitraryQueueMessage(PublishArbitraryQueueMessageRequest) returns (PublishArbitraryQueueMessageResponse);
}

// PublishArbitraryQueueMessage
message PublishArbitraryQueueMessageRequest {
  string QueueName = 1;
  string Body = 2;
}

message PublishArbitraryQueueMessageResponse {
  common.ResponseDetails ResponseDetails = 1;
  bool Success = 2;
}
