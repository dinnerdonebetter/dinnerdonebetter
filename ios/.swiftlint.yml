# SwiftLint Configuration
# https://github.com/realm/SwiftLint

# Paths to include/exclude
included:
  - ios
  - iosTests
  - iosUITests

excluded:
  - ios/Generated      # Generated protobuf files
  - build              # Build artifacts
  - ios.xcodeproj      # Xcode project files
  - Pods               # CocoaPods (if used)
  - .build             # Swift Package Manager build artifacts

# Rules configuration
disabled_rules:
  - trailing_whitespace  # Xcode handles this
  - line_length          # Allow longer lines for readability

opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - operator_usage_whitespace
  - overridden_super_call
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

# Rule configurations
line_length:
  warning: 120
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 100
  error: 200

function_parameter_count:
  warning: 8
  error: 12

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level: 2
  function_level: 3

# Reporter type
reporter: "xcode"
