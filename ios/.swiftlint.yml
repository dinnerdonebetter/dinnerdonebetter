# SwiftLint Configuration
# https://github.com/realm/SwiftLint

# Paths to include/exclude
included:
  - ios/App
  - ios/Views
  - ios/ViewModels
  - ios/Services
  - iosTests
  - iosUITests

excluded:
  - ios/Generated      # Generated protobuf files
  - build              # Build artifacts
  - ios.xcodeproj      # Xcode project files
  - Pods               # CocoaPods (if used)
  - .build             # Swift Package Manager build artifacts
  # SegmentEventReporter.swift is the ONLY file allowed to import Segment
  - ios/Services/Analytics/SegmentEventReporter.swift

# Rules configuration
# Disable all formatting-related rules - swift-format handles formatting
disabled_rules:
  - trailing_whitespace
  - line_length
  - identifier_name
  # Formatting rules that conflict with swift-format
  - operator_usage_whitespace
  - sorted_imports
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - indentation_width
  - opening_brace
  - closing_brace
  - colon
  - comma
  - statement_position
  - trailing_comma
  - trailing_newline
  - vertical_whitespace
  - closure_parameter_position  # Conflicts with swift-format's formatting
  # Length rules - disabled to allow longer files/types
  - file_length
  - type_body_length

# Custom: Forbid import Segment except in SegmentEventReporter.swift.
# SegmentEventReporter.swift is excluded from this rule via path pattern.
custom_rules:
  forbid_segment_import:
    name: "forbid_segment_import"
    regex: "import Segment"
    message: "Only SegmentEventReporter.swift may import Segment. Use EventReporter protocol instead."
    severity: error

opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

# Rule configurations
# Note: line_length is disabled (swift-format handles formatting)
function_body_length:
  warning: 250
  error: 500

function_parameter_count:
  warning: 8
  error: 12

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level: 2
  function_level: 3

# Reporter type
reporter: "xcode"
