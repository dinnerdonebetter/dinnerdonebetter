<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="appBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB75E" />
      <stop offset="100%" stop-color="#ED8F03" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Squircle -->
  <rect width="1024" height="1024" rx="230" fill="url(#appBg)" />
  <!-- Inner Glow -->
  <rect width="1024" height="1024" rx="230" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.2" />

  <g filter="url(#shadow)">
    <!-- Fork -->
    <path d="M 132 300 V 440 A 60 60 0 0 0 252 440 V 300" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
    <path d="M 192 300 V 500" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
    <path d="M 192 500 V 740" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />

    <!-- Knife -->
    <path d="M 760 500 V 300 C 768 300, 784 320, 784 360 V 500 Z" fill="#ffffff" />
    <path d="M 772 500 V 740" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />

    <!-- Plate -->
    <circle cx="512" cy="512" r="200" fill="none" stroke="#ffffff" stroke-width="32" />
    <circle cx="512" cy="512" r="140" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.5" />

    <!-- Checkmark -->
    <path d="M 432 524 L 488 580 L 612 430" fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Sparkles -->
    <path d="M 0 -24 Q 0 0 24 0 Q 0 0 0 24 Q 0 0 -24 0 Q 0 0 0 -24" fill="#ffffff" transform="translate(680, 280) scale(1.2)" />
    <path d="M 0 -24 Q 0 0 24 0 Q 0 0 0 24 Q 0 0 -24 0 Q 0 0 0 -24" fill="#ffffff" transform="translate(320, 720) scale(0.8)" />
  </g>
</svg>